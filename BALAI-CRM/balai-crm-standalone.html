<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#050505" />
<title>BALAI Customer Relationship Management</title>
<style>:root {
  color-scheme: light;
  font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  color: #172136;
  background: #f4efe5;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-body: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --sidebar: #071d3a;
  --sidebar-muted: #a9b0bc;
  --green: #9bbf9e;
  --line: #e2d8c9;
  --soft: #fbf8f1;
  --cream: #f4efe5;
  --paper: #fffdf8;
  --text-muted: #76716b;
  --orange: #bf853d;
  --blue: #0b386c;
  --navy: #08264b;
  --gold: #b9853a;
  --shadow: 0 18px 48px rgba(8, 38, 75, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, rgba(185, 133, 58, 0.12), transparent 28rem),
    var(--cream);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.crm-shell {
  display: grid;
  grid-template-columns: 72px minmax(260px, 360px) minmax(380px, 1fr) minmax(270px, 330px);
  min-height: 100vh;
  background: var(--paper);
}

.sidebar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 10px;
  color: #fff;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%),
    var(--sidebar);
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 0;
  border-radius: 7px;
  color: var(--gold);
  background: #fffaf1;
  font-size: 25px;
  font-weight: 800;
  letter-spacing: 0;
  overflow: hidden;
}

.logo-mark img {
  width: 86%;
  height: 86%;
  object-fit: contain;
}

.quick-add {
  width: 34px;
  height: 34px;
  margin: 0 0 8px;
  border: 0;
  border-radius: 50%;
  color: var(--navy);
  background: linear-gradient(135deg, #fffaf1, #dcc193);
  box-shadow: 0 7px 18px rgba(0, 0, 0, 0.2);
  font-size: 26px;
  line-height: 1;
}

.nav-list {
  display: grid;
  gap: 5px;
  width: 100%;
}

.nav-item {
  display: grid;
  justify-items: center;
  gap: 3px;
  width: 100%;
  border: 0;
  border-radius: 6px;
  padding: 8px 4px;
  color: #d7dde3;
  background: transparent;
}

.nav-item span {
  max-width: 62px;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10px;
  font-weight: 700;
}

.nav-item.active,
.nav-item:hover {
  color: #fffaf1;
  background: rgba(255, 250, 241, 0.12);
}

.help-button,
.user-avatar {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  margin-top: auto;
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 50%;
  color: #fff;
  background: transparent;
  font-weight: 800;
}

.user-avatar {
  margin-top: 6px;
  border: 0;
  color: var(--navy);
  background: linear-gradient(135deg, #fffaf1, #d2ad71);
  font-size: 11px;
}

.people-panel,
.contact-stage,
.info-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--paper);
}

.people-panel {
  display: flex;
  flex-direction: column;
}

.panel-header,
.stage-toolbar,
.info-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 72px;
  padding: 17px 24px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  margin: 0 0 2px;
  color: var(--gold);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
h3,
h4,
p {
  margin-top: 0;
}

h1,
h2,
h3,
h4,
.hero-contact h2 {
  color: var(--navy);
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.01em;
}

h1 {
  margin-bottom: 0;
  font-size: 22px;
  line-height: 1.1;
}

.header-actions {
  display: flex;
  gap: 9px;
}

.header-actions button,
.mini-button,
.close-button {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: 50%;
  color: #252a30;
  background: transparent;
}

.header-actions button:hover,
.mini-button.active,
.mini-button:hover {
  background: #f0e7d8;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 22px 8px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text-muted);
  background: var(--soft);
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  color: var(--navy);
  background: transparent;
}

.market-filter {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 3px 22px 10px;
}

.market-filter button {
  flex: 0 0 auto;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 11px;
  color: #675f54;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.market-filter button.active,
.market-filter button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.quick-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 22px 10px;
}

.metric-card {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 9px;
  background: var(--paper);
}

.metric-card span,
.metric-card strong {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.metric-card span {
  margin-bottom: 2px;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 800;
}

.metric-card strong {
  color: var(--navy);
  font-size: 14px;
}

.select-all {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 8px 18px 12px;
  border: 0;
  color: var(--navy);
  background: transparent;
  text-align: left;
}

.select-all span {
  width: 42px;
  height: 42px;
  border: 2px solid var(--line);
  border-radius: 50%;
}

.contact-list {
  overflow: auto;
  padding: 0 10px 18px;
}

.contact-row {
  display: grid;
  grid-template-columns: 46px minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  width: 100%;
  border: 0;
  border-radius: 8px;
  padding: 10px 10px;
  color: var(--navy);
  background: transparent;
  text-align: left;
}

.contact-row:hover,
.contact-row.selected {
  background: #f3ebdc;
}

.mini-avatar,
.profile-photo {
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: #fff;
  background:
    radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.78), transparent 20%),
    var(--avatar-color);
  font-weight: 800;
}

.mini-avatar {
  width: 42px;
  height: 42px;
  font-size: 13px;
}

.contact-copy {
  min-width: 0;
}

.contact-copy strong,
.contact-copy small {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.contact-copy strong {
  font-size: 14px;
}

.contact-copy small {
  color: var(--text-muted);
  font-size: 11px;
}

.row-meta {
  display: grid;
  justify-items: end;
  gap: 5px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #68727c;
  font-size: 11px;
  font-weight: 800;
}

.status-pill::after,
.segmented span {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  content: "";
}

.status-pill.lead::after,
.lead-dot {
  background: var(--orange);
}

.status-pill.client::after,
.client-dot {
  background: var(--blue);
}

.status-pill.all::after,
.all-dot {
  background: #111821;
}

.other-dot {
  background: #cdd4da;
}

.priority-pill {
  border-radius: 999px;
  padding: 3px 7px;
  color: #5b6570;
  background: #efe8db;
  font-size: 10px;
  font-weight: 900;
}

.priority-pill.high {
  color: #6f4214;
  background: #f7e4c8;
}

.priority-pill.medium {
  color: #304f37;
  background: #e7efe2;
}

.priority-pill.low {
  color: #59636d;
  background: #ece7df;
}

.high-dot {
  background: var(--gold);
}

.medium-dot {
  background: var(--green);
}

.low-dot {
  background: #9ba5ad;
}

.contact-stage {
  display: flex;
  flex-direction: column;
  background: var(--cream);
}

.contact-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  padding: 14px 18px 0;
}

.contact-tabs button {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 7px;
  color: #6b6258;
  background: #fffdf8;
  font-weight: 900;
}

.contact-tabs button.active,
.contact-tabs button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.stage-toolbar {
  justify-content: center;
  position: relative;
}

.segmented {
  display: flex;
  gap: 8px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #f6efe2;
}

.segmented button {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 82px;
  border: 0;
  border-radius: 999px;
  padding: 7px 13px;
  color: #8c8173;
  background: transparent;
  font-size: 12px;
  font-weight: 800;
}

.segmented button.active {
  color: var(--navy);
  background: #fffdf8;
  box-shadow: 0 3px 12px rgba(8, 38, 75, 0.08);
}

.close-button {
  position: absolute;
  right: 22px;
  font-size: 26px;
}

.hero-contact {
  display: grid;
  justify-items: center;
  padding: 42px 24px 34px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, #fffdf8 0%, #fbf5ea 100%);
}

.profile-photo {
  width: 124px;
  height: 124px;
  margin-bottom: 20px;
  border: 5px solid #fffdf8;
  box-shadow: 0 12px 30px rgba(8, 38, 75, 0.13);
  font-size: 31px;
}

.avatar-image {
  overflow: hidden;
  background: #efe8db;
}

.avatar-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.company-avatar,
.company-photo {
  background:
    radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.72), transparent 22%),
    linear-gradient(135deg, var(--navy), #174977 58%, var(--gold));
}

.company-image {
  border-color: rgba(255, 253, 248, 0.96);
  background: #efe8db;
}

.company-photo {
  color: #fffaf1;
  font-family: var(--font-display);
  font-size: 40px;
  box-shadow:
    0 16px 36px rgba(8, 38, 75, 0.16),
    0 0 0 1px rgba(185, 133, 58, 0.18);
}

.account-label {
  margin-bottom: 9px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
}

.hero-contact h2 {
  margin-bottom: 3px;
  font-size: clamp(27px, 3vw, 36px);
  line-height: 1.1;
}

.hero-contact p {
  margin-bottom: 24px;
  color: var(--text-muted);
}

.deal-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: -8px 0 22px;
}

.deal-strip span {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 10px;
  color: #3e4852;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
}

.more-wrap {
  position: relative;
}

.more-menu {
  position: absolute;
  right: 0;
  z-index: 10;
  display: grid;
  width: 168px;
  margin-top: 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffdf8;
  box-shadow: 0 18px 42px rgba(8, 38, 75, 0.14);
  overflow: hidden;
}

.more-menu button {
  border: 0;
  padding: 11px 13px;
  color: var(--navy);
  background: #fffdf8;
  text-align: left;
  font-size: 13px;
  font-weight: 800;
}

.more-menu button:hover {
  background: #f3ebdc;
}

.action-button {
  display: grid;
  justify-items: center;
  gap: 7px;
  min-width: 62px;
  border: 0;
  color: #4d463f;
  background: transparent;
  font-size: 12px;
  font-weight: 800;
}

.action-button span {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(226, 216, 201, 0.9);
  background: linear-gradient(180deg, #fffdf8, #efe7d8);
  color: var(--navy);
  font-size: 18px;
  box-shadow: 0 8px 18px rgba(8, 38, 75, 0.07);
}

.action-button:hover span {
  border-color: #ceb386;
  background: linear-gradient(180deg, #fffaf1, #e3d2b8);
  box-shadow: 0 10px 22px rgba(8, 38, 75, 0.11);
}

.activity {
  flex: 1;
  overflow: auto;
  padding: 26px clamp(22px, 5vw, 44px) 42px;
}

.activity-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.activity-header h3 {
  margin: 0;
  color: #59636d;
  font-size: 14px;
  font-weight: 600;
}

.activity-header div {
  display: flex;
  gap: 5px;
}

.activity-card {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
  padding: 21px 22px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(251, 246, 237, 0.94));
  box-shadow: 0 16px 40px rgba(8, 38, 75, 0.07);
}

.activity-card h4 {
  margin-bottom: 4px;
  font-size: 20px;
}

.activity-card p {
  margin-bottom: 5px;
  color: #4e5963;
  font-size: 14px;
}

.activity-card button {
  border: 0;
  padding: 0;
  color: #2484c6;
  background: transparent;
  font-size: 13px;
  font-weight: 800;
}

.company-linked-card {
  align-items: flex-start;
}

.company-linked-card > div {
  width: 100%;
}

.link-row {
  display: grid;
  width: 100%;
  margin-top: 8px;
  border: 1px solid var(--line) !important;
  border-radius: 7px;
  padding: 10px 12px !important;
  color: var(--navy) !important;
  background: #fbf6ed !important;
  text-align: left;
}

.link-row:hover {
  border-color: #ceb386 !important;
  background: #f4eadb !important;
}

.link-row small {
  color: var(--text-muted);
  font-size: 12px;
}

.next-step-card {
  border-color: #d6e8ce;
  background: linear-gradient(180deg, #fffdf8, #f7f0e4);
}

.workspace-shell {
  grid-template-columns: 72px minmax(0, 1fr);
}

.contacts-layout {
  display: grid;
  grid-template-columns: minmax(260px, 360px) minmax(380px, 1fr) minmax(270px, 330px);
  min-height: calc(100vh - 92px);
}

.crm-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--paper);
}

.panel-header.compact {
  min-height: 72px;
}

.panel-header.compact button {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 50%;
  background: #f1e6d5;
}

.workspace-page {
  min-width: 0;
  min-height: 100vh;
  overflow: auto;
  background:
    radial-gradient(circle at 100% 0%, rgba(185, 133, 58, 0.1), transparent 24rem),
    var(--cream);
}

.workspace-header {
  position: relative;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 92px;
  padding: 24px 30px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(255, 253, 248, 0.9)),
    radial-gradient(circle at 18% 0%, rgba(185, 133, 58, 0.12), transparent 20rem);
  box-shadow: 0 14px 34px rgba(8, 38, 75, 0.06);
  backdrop-filter: blur(14px);
}

.workspace-header h1 {
  margin-bottom: 5px;
  font-size: 34px;
}

.workspace-header p {
  margin-bottom: 0;
  color: var(--text-muted);
}

.workspace-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 9px;
}

.workspace-actions button,
.workspace-card button,
.campaign-card button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 12px;
  color: var(--navy);
  background: linear-gradient(180deg, #fffdf8, #fbf6ed);
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 5px 14px rgba(8, 38, 75, 0.04);
}

.filter-row button {
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 12px;
  color: #6b6258;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.filter-row button.active,
.filter-row button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.workspace-actions button:hover,
.workspace-card button:hover,
.campaign-card button:hover {
  border-color: #ceb386;
  background: #f4eadb;
  box-shadow: 0 8px 20px rgba(8, 38, 75, 0.08);
}

.workspace-grid {
  display: grid;
  gap: 18px;
  padding: 22px 30px 0;
}

.home-view-switch {
  padding: 22px 30px 0;
}

.home-tabs {
  width: min(420px, 100%);
  padding: 0;
}

.home-system-layout {
  display: grid;
  grid-template-columns: minmax(520px, 1fr) minmax(260px, 360px);
  gap: 22px;
  padding: 28px 30px;
}

.relationship-system {
  position: relative;
  min-height: 660px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    radial-gradient(circle at 50% 50%, rgba(185, 133, 58, 0.13), transparent 9rem),
    radial-gradient(circle at center, rgba(255, 253, 248, 0.98) 0 12%, rgba(244, 239, 229, 0.54) 43%, rgba(255, 253, 248, 0.94) 100%),
    linear-gradient(135deg, #fffdf8, #f4efe5);
  box-shadow: 0 24px 70px rgba(8, 38, 75, 0.1);
}

.orbit-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px solid rgba(185, 133, 58, 0.16);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(185, 133, 58, 0.035);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.orbit-high {
  width: 280px;
  height: 280px;
}

.orbit-medium {
  width: 430px;
  height: 430px;
}

.orbit-low {
  width: 560px;
  height: 560px;
}

.system-core {
  position: absolute;
  top: 50%;
  left: 50%;
  z-index: 5;
  display: grid;
  place-items: center;
  box-sizing: border-box;
  width: 98px;
  height: 98px;
  overflow: hidden;
  border: 1px solid rgba(185, 133, 58, 0.38);
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 45%, rgba(255, 253, 248, 1), rgba(251, 246, 237, 0.97) 74%);
  box-shadow:
    0 22px 54px rgba(8, 38, 75, 0.12),
    inset 0 0 0 5px rgba(185, 133, 58, 0.055),
    inset 0 0 0 1px rgba(255, 253, 248, 0.86);
  transform: translate(-50%, -50%);
  transition: box-shadow 0.18s ease, transform 0.18s ease;
}

.system-core img {
  display: block;
  width: 76px;
  height: 76px;
  object-fit: contain;

}

.subtle-button:hover,
.button-link:hover,
.service-actions button:hover {
  border-color: #ceb386;
  background: #f4eadb;
}

.template-dropzone {
  display: grid;
  gap: 4px;
  border: 1px dashed rgba(185, 133, 58, 0.38);
  border-radius: 8px;
  padding: 14px;
  color: var(--navy);
  background:
    linear-gradient(180deg, rgba(255, 253, 248, 0.76), rgba(251, 246, 237, 0.72));
  box-shadow: inset 0 0 0 1px rgba(255, 253, 248, 0.58);
}

.template-dropzone span {
  color: var(--gold);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.template-dropzone strong {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.template-dropzone small {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 750;
}

.template-dropzone.has-template {
  border-style: solid;
  border-color: rgba(155, 191, 158, 0.48);
  background:
    linear-gradient(180deg, rgba(251, 253, 248, 0.92), rgba(239, 246, 233, 0.76));
}

.template-dropzone.is-dragover {
  border-color: var(--gold);
  background: #fff7e8;
  box-shadow:
    inset 0 0 0 1px rgba(185, 133, 58, 0.16),
    0 14px 30px rgba(8, 38, 75, 0.08);
}

.automation-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 20px;
  align-items: center;
  padding: 15px 0;
  border-bottom: 1px solid var(--line);
}

.automation-row:last-child {
  border-bottom: 0;
}

.automation-row span {
  min-width: 0;
}

.automation-row strong,
.automation-row small {
  display: block;
}

.automation-row small {
  color: var(--text-muted);
}

.toggle {
  display: inline-flex;
  align-items: center;
  width: 48px;
  height: 28px;
  border: 0;
  border-radius: 999px;
  padding: 3px;
  background: #d7ccbb;
}

.toggle i {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #fffdf8;
  transition: transform 0.16s ease;
}

.toggle.on {
  background: var(--gold);
}

.toggle.on i {
  transform: translateX(20px);
}

.report-bars {
  display: grid;
  gap: 15px;
}

.report-bar {
  display: grid;
  grid-template-columns: 120px minmax(0, 1fr) 120px;
  gap: 14px;
  align-items: center;
}

.report-bar span,
.report-bar strong {
  font-size: 13px;
}

.report-bar div {
  overflow: hidden;
  height: 10px;
  border-radius: 999px;
  background: #efe5d5;
}

.report-bar i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--navy), var(--gold));
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  padding: 22px;
  background: rgba(7, 29, 58, 0.52);
}

.edit-modal {
  width: min(820px, 100%);
  max-height: min(860px, calc(100vh - 44px));
  overflow: auto;
  border-radius: 8px;
  background: #fffdf8;
  box-shadow: 0 26px 70px rgba(7, 29, 58, 0.28);
}

.edit-modal header,
.edit-modal footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
}

.edit-modal footer {
  justify-content: flex-end;
  border-top: 1px solid var(--line);
  border-bottom: 0;
}

.edit-modal header button,
.edit-modal footer button {
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 10px 14px;
  color: var(--navy);
  background: #fffdf8;
  font-weight: 800;
}

.edit-modal footer button[type="submit"],
.edit-modal footer button:last-child {
  color: #fff;
  background: var(--navy);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 22px;
}

.form-grid label {
  display: grid;
  gap: 6px;
}

.form-grid label span {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 900;
}

.form-grid input,
.form-grid select,
.form-grid textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 11px 12px;
  outline: 0;
  color: var(--navy);
  background: #fbf6ed;
}

.form-grid input:focus,
.form-grid select:focus,
.form-grid textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(185, 133, 58, 0.14);
}

.form-grid textarea {
  min-height: 88px;
  resize: vertical;
}

.form-grid .wide {
  grid-column: 1 / -1;
}

.hidden-input {
  display: none;
}

.toast {
  position: fixed;
  right: 22px;
  bottom: 22px;
  z-index: 60;
  border-radius: 8px;
  padding: 13px 16px;
  color: #fff;
  background: var(--navy);
  box-shadow: var(--shadow);
  font-weight: 800;
}

.card-icon {
  display: grid;
  place-items: center;
  flex: 0 0 34px;
  width: 34px;
  height: 34px;
  border: 2px solid var(--gold);
  border-radius: 7px;
  color: var(--navy);
}

.compact-card {
  display: block;
}

.compact-card strong {
  display: block;
  margin-bottom: 2px;
  font-size: 30px;
}

.info-panel {
  border-right: 0;
}

.info-header {
  justify-content: flex-start;
  gap: 12px;
}

.info-header > span {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  color: var(--navy);
}

.info-header h2 {
  margin: 0;
  font-size: 21px;
}

.info-header p {
  margin: 0;

}

.info-section {

}

.info-section h3 {

}

.info-section dl {

}

.info-section dt {

}

.info-section dd {
  margin: 0;

  font-size: 14px;
}

.empty-state {

  font-size: 14px;
}

:root {
  color-scheme: dark;
  --font-display: "Syne", "Inter Tight", ui-sans-serif, system-ui, sans-serif;
  --font-body: "Inter Tight", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  --bg: #050505;
  --bg-raised: #090909;
  --surface-1: #0d0d0d;
  --surface-2: #121212;
  --surface-3: #171717;
  --surface-4: #1d1d1d;
  --ivory: #f2ece3;
  --ivory-soft: #d7d0c7;
  --muted: #8e8881;
  --muted-deep: #67635f;
  --line: rgba(242, 236, 227, 0.075);
  --line-strong: rgba(242, 236, 227, 0.13);
  --orange: #df640f;
  --orange-bright: #f0711c;
  --burgundy: #723447;
  --burgundy-deep: #401b28;
  --brass: #b89a61;
  --sage: #71816e;
  --blue-grey: #758b98;

  /* Compatibility tokens used by the original CRM CSS. */
  --sidebar: var(--bg);
  --cream: var(--bg);
  --paper: var(--surface-1);
  --soft: var(--surface-2);
  --navy: var(--ivory);
  --gold: var(--brass);
  --blue: var(--blue-grey);
  --green: var(--sage);
  --text-muted: var(--muted);
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
}

html {
  background: var(--bg);
}

body {
  color: var(--ivory);
  background:
    radial-gradient(circle at 93% 0%, rgba(223, 100, 15, 0.075), transparent 25rem),
    radial-gradient(circle at 7% 100%, rgba(114, 52, 71, 0.055), transparent 28rem),
    var(--bg);
  font-family: var(--font-body);
  letter-spacing: -0.008em;
}

body::before {
  position: fixed;
  inset: 0;
  z-index: 9999;
  opacity: 0.055;
  background-image: radial-gradient(circle, #fff 0 0.42px, transparent 0.68px);
  background-size: 8px 8px;
  content: "";
  pointer-events: none;
}

* {
  scrollbar-color: #3a3734 transparent;
  scrollbar-width: thin;
}

*::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

*::-webkit-scrollbar-thumb {
  border: 2px solid transparent;
  border-radius: 999px;
  background: #3a3734;
  background-clip: padding-box;
}

::selection {
  color: #fff8ef;
  background: var(--orange);
}

button,
input,
select,
textarea {
  font-family: inherit;
}

button,
a,
input,
select,
textarea {
  -webkit-tap-highlight-color: transparent;
}

button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--orange-bright);
  outline-offset: 3px;
}

h1,
h2,
h3,
h4,
.hero-contact h2,
.map-title strong,
.metric-panel strong,
.pipeline-column > header strong {
  color: var(--ivory);
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.045em;
}

.crm-shell,
.workspace-page,
.people-panel,
.contact-stage,
.info-panel,
.crm-panel {
  color: var(--ivory);
  background: var(--bg);
}

/* SIDEBAR ------------------------------------------------------------ */

.workspace-shell {
  grid-template-columns: 78px minmax(0, 1fr);
  background: var(--bg);
}

.sidebar {
  position: sticky;
  top: 0;
  z-index: 30;
  height: 100vh;
  gap: 9px;
  padding: 16px 9px 14px;
  border-right: 1px solid var(--line);
  color: var(--ivory-soft);
  background:
    radial-gradient(circle at 50% 0%, rgba(223, 100, 15, 0.09), transparent 9rem),
    linear-gradient(180deg, #090909, #050505 72%);
  box-shadow: 14px 0 44px rgba(0, 0, 0, 0.18);
}

.brand-mark.logo-mark {
  width: 50px;
  height: 50px;
  margin-bottom: 1px;
  border: 1px solid rgba(184, 154, 97, 0.32);
  border-radius: 15px;
  color: var(--brass);
  background: #0d0d0d;
  box-shadow:
    0 14px 28px rgba(0, 0, 0, 0.36),
    inset 0 0 0 1px rgba(255, 255, 255, 0.018);
}

.logo-mark img {
  width: 92%;
  height: 92%;
  object-fit: contain;
  filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.46));
}

.quick-add {
  width: 38px;
  height: 38px;
  margin-bottom: 4px;
  border: 0;
  color: #fff8ef;
  background: var(--orange);
  box-shadow: 0 12px 26px rgba(223, 100, 15, 0.25);
  transition: transform 150ms ease, background 150ms ease;
}

.quick-add:hover {
  background: var(--orange-bright);
  transform: translateY(-2px);
}

.nav-list {
  gap: 4px;
}

.nav-item {
  position: relative;
  gap: 4px;
  min-height: 52px;
  border-radius: 10px;
  color: #817b75;
  background: transparent;
  transition: color 140ms ease, background 140ms ease, transform 140ms ease;
}

.nav-item svg {
  width: 19px;
  height: 19px;
  color: #918064;
  transition: color 140ms ease;
}

.nav-item span {
  max-width: 58px;
  color: inherit;
  font-size: 9px;
  font-weight: 650;
  letter-spacing: 0.01em;
}

.nav-item::before {
  position: absolute;
  top: 13px;
  bottom: 13px;
  left: -9px;
  width: 3px;
  border-radius: 0 999px 999px 0;
  background: transparent;
  content: "";
}

.nav-item.active,
.nav-item:hover {
  color: var(--ivory);
  background: var(--surface-3);
  transform: translateX(1px);
}

.nav-item.active::before {
  background: var(--orange);
  box-shadow: 0 0 18px rgba(223, 100, 15, 0.4);
}

.nav-item.active svg,
.nav-item:hover svg {
  color: var(--orange-bright);
}

.nav-item::after {
  position: absolute;
  top: 50%;
  left: calc(100% + 11px);
  z-index: 80;
  padding: 7px 10px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  color: var(--ivory);
  background: rgba(20, 20, 20, 0.96);
  box-shadow: 0 12px 34px rgba(0, 0, 0, 0.36);
  content: attr(data-tooltip);
  font-size: 11px;
  font-weight: 600;
  opacity: 0;
  transform: translate(3px, -50%);
  transition: opacity 120ms ease, transform 120ms ease;
  white-space: nowrap;
  pointer-events: none;
}

.nav-item:hover::after {
  opacity: 1;
  transform: translate(0, -50%);
}

.help-button,
.user-avatar {
  border-color: var(--line-strong);
  color: var(--ivory-soft);
  background: var(--surface-2);
}

.user-avatar {
  color: #fff1e7;
  background: linear-gradient(145deg, var(--burgundy), var(--burgundy-deep));
  box-shadow: 0 10px 22px rgba(0, 0, 0, 0.3);
}

/* PAGE HEADER -------------------------------------------------------- */

.workspace-page,
.people-panel,
.contact-stage,
.info-panel,
.crm-panel {
  border-color: var(--line);
  background:
    radial-gradient(circle at 100% 0%, rgba(223, 100, 15, 0.026), transparent 18rem),
    var(--bg-raised);
}

.workspace-header {
  position: sticky;
  top: 0;
  z-index: 24;
  min-height: 92px;
  padding: 20px 30px;
  border-bottom: 1px solid var(--line);
  background: rgba(8, 8, 8, 0.91);
  box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
  backdrop-filter: blur(22px) saturate(1.1);
}

.workspace-heading {
  min-width: 0;
}

.workspace-header h1 {
  margin-bottom: 5px;
  font-size: clamp(31px, 2.7vw, 42px);
  line-height: 0.98;
}

.workspace-header p:last-child {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.eyebrow,
.account-label,
.map-title span,
.template-dropzone span {
  color: var(--orange-bright);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.workspace-command-area {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 14px;
}

.save-status {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: #77716c;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}

.save-status i,
.vault-status i {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #7f9a77;
  box-shadow: 0 0 12px rgba(127, 154, 119, 0.46);
}

.workspace-actions {
  gap: 7px;
}

.workspace-actions button {
  min-height: 38px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  padding: 0 14px;
  color: var(--ivory-soft);
  background: var(--surface-2);
  box-shadow: none;
  font-size: 12px;
  font-weight: 650;
  transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
}

.workspace-actions button:hover {
  border-color: rgba(223, 100, 15, 0.55);
  color: var(--ivory);
  background: #1b1612;
  transform: translateY(-1px);
}

.workspace-actions .header-primary {
  border-color: var(--orange);
  color: #fff8ef;
  background: var(--orange);
  box-shadow: 0 10px 24px rgba(223, 100, 15, 0.18);
}

.workspace-actions .header-primary:hover {
  border-color: var(--orange-bright);
  background: var(--orange-bright);
}

.workspace-actions .header-secondary {
  color: #111;
  border-color: var(--ivory);
  background: var(--ivory);
}

.workspace-actions .header-secondary:hover {
  color: #111;
  border-color: #fff;
  background: #fff;
}

.workspace-actions .header-utility {
  width: 38px;
  padding: 0;
  border-color: transparent;
  color: #8c857e;
  background: transparent;
}

.workspace-actions .header-utility span {
  display: none;
}

.workspace-actions .header-utility:hover {
  color: var(--ivory);
  border-color: var(--line-strong);
  background: var(--surface-2);
}

/* SURFACES ----------------------------------------------------------- */

.workspace-card,
.campaign-card,
.service-card,
.pipeline-column,
.search-page-card,
.metric-card,
.info-section,
.form-section,
.activity-card,
.more-menu,
.map-tool-menu,
.edit-modal {
  border: 1px solid var(--line);
  border-radius: 12px;
  color: var(--ivory);
  background: var(--surface-2);
  box-shadow: 0 16px 38px rgba(0, 0, 0, 0.18);
}

.workspace-card,
.campaign-card,
.service-card,
.activity-card {
  transition: border-color 140ms ease, background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}

.workspace-card:hover,
.campaign-card:hover,
.service-card:hover,
.activity-card:hover {
  border-color: rgba(223, 100, 15, 0.24);
  background: #151412;
  box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
  transform: translateY(-1px);
}

.workspace-card h2,
.campaign-card h2,
.service-card h2,
.activity-card h4 {
  color: var(--ivory);
}

.workspace-card p,
.campaign-card p,
.service-card p,
.activity-card p,
.card-heading p {
  color: var(--muted);
}

/* GENERAL BUTTONS ---------------------------------------------------- */

.workspace-card button,
.campaign-card button,
.service-actions button,
.primary-button,
.save-button,
.edit-modal footer button[type="submit"] {
  min-height: 37px;
  border: 1px solid var(--ivory);
  border-radius: 999px;
  color: #111;
  background: var(--ivory);
  box-shadow: none;
  font-weight: 650;
}

.workspace-card button:hover,
.campaign-card button:hover,
.service-actions button:hover,
.primary-button:hover,
.save-button:hover,
.edit-modal footer button[type="submit"]:hover {
  border-color: var(--orange-bright);
  color: #fff8ef;
  background: var(--orange-bright);
}

.subtle-button,
.button-link,
.secondary-button,
.header-actions button,
.mini-button,
.close-button,
.edit-modal footer button:not([type="submit"]) {
  border-color: var(--line-strong);
  color: var(--ivory-soft);
  background: var(--surface-3);
  box-shadow: none;
}

.more-menu .danger-action {
  color: #ee928d;
}

.more-menu .danger-action:hover {
  color: #fff;
  background: #6a2529;
}

/* INPUTS ------------------------------------------------------------- */

.search-box,
input,
select,
textarea {
  border-color: var(--line-strong);
  border-radius: 9px;
  color: var(--ivory);
  background: var(--surface-3);
  box-shadow: none;
}

input::placeholder,
textarea::placeholder {
  color: var(--muted-deep);
}

select option {
  color: var(--ivory);
  background: var(--surface-3);
}

input:focus,
select:focus,
textarea:focus,
.search-box:focus-within {
  border-color: var(--orange-bright);
  outline: 0;
  box-shadow: 0 0 0 3px rgba(223, 100, 15, 0.1);
}

.search-box svg {
  color: var(--brass);
}

/* PILLS / FILTERS ---------------------------------------------------- */

.market-filter button,
.contact-tabs button,
.home-tabs button,
.segmented button,
.priority-pill,
.status-pill,
.deal-strip span,
.filter-row button {
  border-color: var(--line);
  color: #99928a;
  background: var(--surface-3);
}

.market-filter button.active,
.contact-tabs button.active,
.home-tabs button.active,
.segmented button.active,
.filter-row button.active,
.market-filter button:hover,
.contact-tabs button:hover,
.home-tabs button:hover,
.filter-row button:hover {
  border-color: rgba(223, 100, 15, 0.42);
  color: var(--ivory);
  background: #21150f;
  box-shadow: inset 0 0 0 1px rgba(223, 100, 15, 0.05);
}

.priority-pill.high {
  color: #fff6eb;
  background: var(--orange);
}

.priority-pill.medium {
  color: #fff1e9;
  background: var(--burgundy);
}

.priority-pill.low {
  color: #d4cec7;
  background: #302e2c;
}

/* HOME --------------------------------------------------------------- */

.home-view-switch {
  padding: 15px 28px 0;
}

.home-tabs {
  width: 286px;
  gap: 3px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-1);
}

.home-tabs button {
  min-height: 33px;
  border: 0;
  border-radius: 999px;
  font-size: 12px;
}

.home-system-layout {
  grid-template-columns: minmax(600px, 1fr) 286px;
  gap: 15px;
  padding: 15px 28px 28px;
}

.relationship-system,
.world-map-panel {
  min-height: 610px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface-1);
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.26);
}

.map-title {
  top: 22px;
  left: 23px;
  width: auto;
  max-width: 360px;
  padding: 0;
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  backdrop-filter: none;
}

.map-title strong {
  display: block;
  margin-top: 4px;
  font-size: 25px;
  letter-spacing: -0.045em;
}

.map-title p {
  max-width: 305px;
  margin-top: 7px;
  color: #77716b;
  font-size: 11px;
  line-height: 1.45;
}

.map-tools {
  top: 19px;
  right: 19px;
}

.map-tool-toggle {
  width: 35px;
  height: 35px;
  border-color: var(--line-strong);
  color: var(--ivory-soft);
  background: var(--surface-3);
  box-shadow: none;
}

.map-tool-toggle:hover {
  border-color: rgba(223, 100, 15, 0.4);
  background: #1b1511;
}

.dot-icon i {
  width: 3px;
  height: 3px;
  background: currentColor;
}

.map-tool-menu {
  width: 210px;
  padding: 5px;
  background: rgba(20, 20, 20, 0.98);
  backdrop-filter: blur(14px);
}

.map-tool-menu button {
  min-height: 38px;
  border-radius: 8px;
  color: var(--ivory-soft);
  background: transparent;
}

.map-tool-menu button:hover {
  color: var(--ivory);
  background: #21150f;
}

.map-edit-hint {
  border-color: rgba(223, 100, 15, 0.28);
  color: var(--ivory-soft);
  background: rgba(31, 20, 14, 0.94);
}

/* Orbit */

.relationship-system {
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 54%, rgba(223, 100, 15, 0.055), transparent 10rem),
    radial-gradient(circle at 50% 54%, #111 0, #0c0c0c 66%, #090909 100%);
}

.relationship-system::after {
  position: absolute;
  right: 22px;
  bottom: 16px;
  color: #4f4b47;
  content: "RELATIONSHIPS / PRIORITY";
  font-size: 8px;
  font-weight: 650;
  letter-spacing: 0.18em;
}

.orbit-ring {
  border-color: rgba(184, 154, 97, 0.105);
  box-shadow: none;
}

.orbit-ring::after {
  position: absolute;
  top: -9px;
  left: 50%;
  padding: 0 7px;
  color: #504b46;
  background: #0d0d0d;
  font-size: 7px;
  font-weight: 650;
  letter-spacing: 0.14em;
  transform: translateX(-50%);
}

.orbit-high::after { content: "01 / HIGH"; }
.orbit-medium::after { content: "02 / MEDIUM"; }
.orbit-low::after { content: "03 / LOW"; }

.orbit-medium {
  border-style: dashed;
}

.system-core {
  width: 98px;
  height: 98px;
  border-color: rgba(184, 154, 97, 0.48);
  background:
    radial-gradient(circle at 50% 42%, rgba(223, 100, 15, 0.09), transparent 58%),
    #0d1820;
  box-shadow:
    0 24px 56px rgba(0, 0, 0, 0.48),
    0 0 0 8px rgba(184, 154, 97, 0.025),
    inset 0 0 0 1px rgba(255, 255, 255, 0.025);
}

.system-core img {
  width: 76px;
  height: 76px;
}

.company-planet {
  border-color: rgba(184, 154, 97, 0.38);
  padding: 5px;
  color: var(--ivory);
  background: var(--surface-3);
  box-shadow:
    0 12px 27px rgba(0, 0, 0, 0.36),
    inset 0 0 0 1px rgba(255, 255, 255, 0.02);
  transition: width 170ms ease, height 170ms ease, border-color 170ms ease, filter 170ms ease, opacity 170ms ease;
}

.company-planet.high {
  border-color: rgba(223, 100, 15, 0.82);
  background: #1c120d;
}

.company-planet.medium {
  background: #171415;
}

.company-planet.low {
  background: #141414;
}

.company-planet > span {
  color: #fff4e9;
  background: linear-gradient(145deg, #1a3442, var(--burgundy));
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
}

.company-planet strong {
  top: calc(100% + 8px);
  max-width: 140px;
  padding: 0;
  border: 0;
  color: #aaa29a;
  background: transparent;
  box-shadow: none;
  font-size: 10px;
  font-weight: 600;
  opacity: 0.82;
  transform: translate(-50%, 0);
}

.company-planet small {
  top: calc(100% + 23px);
  padding: 0;
  border: 0;
  color: #5e5955;
  background: transparent;
  font-size: 8px;
  opacity: 0;
}

.relationship-system:has(.company-planet:hover) .company-planet:not(:hover) {
  opacity: 0.42;
  filter: saturate(0.55);
}

.company-planet:hover,
.company-planet:focus-visible,
.company-planet.is-dragging {
  z-index: 26;
  border-color: var(--orange-bright);
  filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.32));
}

.company-planet:hover strong,
.company-planet:focus-visible strong,
.company-planet.is-dragging strong {
  color: var(--ivory);
  opacity: 1;
}

.company-planet:hover small,
.company-planet:focus-visible small,
.company-planet.is-dragging small {
  opacity: 1;
}

/* Summary */

.system-summary {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 9px;
}

.metric-panel {
  min-height: 122px;
  padding: 16px;
  border-color: var(--line);
  background: var(--surface-2);
  box-shadow: none;
}

.metric-panel span {
  color: var(--orange-bright);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.metric-panel strong {
  margin: 10px 0 4px;
  color: var(--ivory);
  font-family: var(--font-body);
  font-size: clamp(27px, 2.1vw, 34px);
  font-weight: 600;
  line-height: 0.95;
  letter-spacing: -0.045em;
  white-space: nowrap;
}

.metric-panel p {
  margin: 0;
  color: #716b65;
  font-size: 10px;
}

.system-summary > .workspace-card {
  grid-column: 1 / -1;
}

.vault-card {
  padding: 17px;
  border-color: rgba(127, 154, 119, 0.17);
  background:
    radial-gradient(circle at 100% 0%, rgba(127, 154, 119, 0.07), transparent 9rem),
    var(--surface-2);
  box-shadow: none;
}

.vault-card .card-heading {
  align-items: flex-start;
}

.vault-card h2 {
  margin: 2px 0 0;
  font-size: 18px;
}

.vault-card p {
  margin: 14px 0;
  color: #827b74;
  font-size: 11px;
  line-height: 1.5;
}

.vault-card button {
  min-height: 32px;
  border-color: var(--line-strong);
  color: var(--ivory-soft);
  background: var(--surface-3);
  font-size: 10px;
}

.vault-status {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  color: #77716a;
  font-size: 9px;
}

.vault-status strong {
  color: #a49d95;
  font-weight: 600;
}

/* World map */

.world-map-panel {
  background:
    radial-gradient(circle at 70% 36%, rgba(223, 100, 15, 0.035), transparent 17rem),
    linear-gradient(180deg, #0e0e0e, #090909);
}

.world-map {
  inset: 89px 18px 18px;
  overflow: hidden;
  border-color: var(--line);
  border-radius: 12px;
  background: #080808;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.008);
}

.world-map::before {
  z-index: 1;
  opacity: 1;
  background:
    radial-gradient(circle at 67% 39%, rgba(223, 100, 15, 0.032), transparent 18rem),
    linear-gradient(rgba(255, 255, 255, 0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.016) 1px, transparent 1px);
  background-size: auto, 72px 72px, 72px 72px;
}

.world-map::after {
  box-shadow: inset 0 0 74px 22px rgba(0, 0, 0, 0.48);
}

.world-map-art {
  inset: 23px 24px 30px;
  width: calc(100% - 48px);
  height: calc(100% - 53px);
  opacity: 1;
  filter: none;
}

.map-graticule {
  fill: none;
  stroke: rgba(255, 255, 255, 0.022);
  stroke-width: 0.55;
  vector-effect: non-scaling-stroke;
}

.editorial-land {
  opacity: 0.95;
}

.continent {
  stroke: rgba(184, 154, 97, 0.14);
  stroke-width: 0.6;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
}

.continent-europe,
.continent-asia {
  filter: brightness(1.06);
}

.bridge-routes {
  fill: none;
  stroke: rgba(223, 100, 15, 0.16);
  stroke-width: 1;
  stroke-dasharray: 3 7;
  vector-effect: non-scaling-stroke;
}

.bridge-routes path:last-child {
  stroke: rgba(184, 154, 97, 0.12);
}

.map-coordinate-labels {
  fill: #494540;
  font-family: var(--font-body);
  font-size: 7px;
  font-weight: 600;
  letter-spacing: 0.18em;
}

.land-shadow,
.land {
  display: none;
}

.map-marker {
  width: 32px;
  min-width: 32px;
  transition: opacity 160ms ease, filter 160ms ease;
}

.map-marker i {
  width: 28px;
  height: 28px;
  border: 2px solid #080808;
  color: #fff4e9;
  background: var(--burgundy);
  box-shadow:
    0 0 0 1px rgba(184, 154, 97, 0.52),
    0 10px 22px rgba(0, 0, 0, 0.46);
  font-family: var(--font-body);
  font-size: 8px;
}

.map-marker.high i {
  width: 34px;
  height: 34px;
  background: var(--orange);
  box-shadow:
    0 0 0 1px rgba(223, 100, 15, 0.78),
    0 12px 26px rgba(0, 0, 0, 0.5);
}

.map-marker span {
  top: 39px;
  max-width: 140px;
  padding: 0;
  border: 0;
  color: #b8afa6;
  background: transparent;
  box-shadow: none;
  font-size: 9px;
  font-weight: 600;
}

.map-marker small {
  top: 55px;
  color: #6f6963;
  background: rgba(13, 13, 13, 0.96);
}

.world-map:has(.map-marker:hover) .map-marker:not(:hover) {
  opacity: 0.32;
  filter: saturate(0.45);
}

.map-marker:hover,
.map-marker:focus-visible,
.map-marker.is-dragging {
  z-index: 40;
}

.map-marker:hover i,
.map-marker:focus-visible i,
.map-marker.is-dragging i {
  width: 44px;
  height: 44px;
  border-color: #080808;
  font-size: 11px;
}

.map-marker:hover span,
.map-marker:focus-visible span,
.map-marker.is-dragging span {
  color: var(--ivory);
  opacity: 1;
}

.map-legend {
  position: absolute;
  bottom: 14px;
  left: 16px;
  z-index: 6;
  display: flex;
  gap: 13px;
  padding: 7px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: #77716a;
  background: rgba(13, 13, 13, 0.86);
  font-size: 8px;
  font-weight: 600;
  backdrop-filter: blur(12px);
}

.map-legend span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.map-legend i {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.legend-high { background: var(--orange); }
.legend-medium { background: var(--burgundy); }
.legend-low { background: #615e5a; }

/* CONTACTS ----------------------------------------------------------- */

.contacts-layout {
  grid-template-columns: 312px minmax(470px, 1fr) 294px;
  min-height: calc(100vh - 92px);
}

.panel-header.compact,
.stage-toolbar,
.info-header {
  min-height: 66px;
  border-color: var(--line);
  background: rgba(12, 12, 12, 0.96);
  box-shadow: none;
}

.panel-header.compact {
  padding: 14px 18px;
}

.panel-header.compact h1 {
  font-size: 20px;
}

.panel-header.compact button {
  color: var(--ivory);
  background: var(--surface-3);
}

.contact-tabs {
  gap: 4px;
  padding: 12px 14px 0;
}

.contact-tabs button {
  min-height: 34px;
  border-radius: 8px;
  font-size: 11px;
}

.search-box {
  margin: 13px 14px 8px;
  padding: 9px 11px;
}

.market-filter {
  padding: 2px 14px 10px;
}

.market-filter button {
  padding: 6px 10px;
  font-size: 10px;
}

.contact-list {
  padding: 0 7px 18px;
}

.contact-row {
  grid-template-columns: 42px minmax(0, 1fr) auto;
  gap: 10px;
  border-radius: 9px;
  padding: 9px 9px;
  color: var(--ivory);
}

.contact-row:hover,
.contact-row.selected {
  color: var(--ivory);
  background: var(--surface-3);
  box-shadow: inset 3px 0 0 var(--orange);
}

.contact-copy strong {
  font-size: 13px;
}

.contact-copy small,
.row-meta small {
  color: #77716b;
  font-size: 10px;
}

.mini-avatar {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
}

.hero-contact {
  display: grid;
  grid-template-columns: 108px minmax(0, 1fr);
  align-items: center;
  justify-items: stretch;
  column-gap: 22px;
  row-gap: 20px;
  padding: 30px clamp(24px, 4vw, 42px) 24px;
  border-color: var(--line);
  text-align: left;
  background:
    radial-gradient(circle at 12% 42%, rgba(223, 100, 15, 0.06), transparent 9rem),
    var(--surface-1);
}

.profile-photo {
  grid-column: 1;
  grid-row: 1;
  width: 108px;
  height: 108px;
  margin: 0;
  border: 3px solid var(--surface-3);
  box-shadow: 0 15px 38px rgba(0, 0, 0, 0.38);
}

.hero-copy {
  grid-column: 2;
  min-width: 0;
}

.account-label {
  margin-bottom: 7px;
}

.hero-contact h2 {
  margin-bottom: 5px;
  font-size: clamp(28px, 2.45vw, 38px);
  line-height: 0.98;
}

.hero-subline {
  margin: 0 0 13px;
  color: #8d867f;
  font-size: 13px;
}

.deal-strip {
  justify-content: flex-start;
  gap: 6px;
  margin: 0;
}

.deal-strip span {
  padding: 5px 8px;
  border-radius: 999px;
  font-size: 9px;
}

.action-row {
  grid-column: 1 / -1;
  justify-content: flex-start;
  gap: 8px;
  padding-top: 17px;
  border-top: 1px solid var(--line);
}

.action-button {
  min-width: 56px;
  gap: 6px;
  color: #938c84;
  font-size: 10px;
  font-weight: 600;
}

.action-button span {
  width: 38px;
  height: 38px;
  border-color: var(--line-strong);
  color: var(--ivory-soft);
  background: var(--surface-3);
  box-shadow: none;
}

.action-button:hover {
  color: var(--ivory);
}

.action-button:hover span {
  border-color: var(--orange);
  color: #fff8ef;
  background: var(--orange);
}

.activity {
  padding: 20px clamp(22px, 4vw, 38px) 34px;
}

.activity-header h3 {
  color: #77716b;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.activity-card {
  margin-bottom: 10px;
  padding: 17px 18px;
  background: var(--surface-2);
  box-shadow: none;
}

.activity-card h4 {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 650;
  letter-spacing: -0.02em;
}

.activity-card p {
  font-size: 12px;
  line-height: 1.5;
}

.card-icon {
  color: #5d5752;
}

.next-step-card {
  border-color: rgba(223, 100, 15, 0.16);
  background:
    linear-gradient(90deg, rgba(223, 100, 15, 0.055), transparent 45%),
    var(--surface-2);
}

.info-panel {
  background: #0a0a0a;
}

.info-header {
  padding: 15px 18px;
}

.info-header > span {
  color: var(--brass);
}

.info-header h2 {
  margin-bottom: 2px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 650;
  letter-spacing: -0.02em;
}

.info-header p {
  color: #6f6963;
  font-size: 10px;
}

.info-section {
  margin: 0;
  padding: 17px 18px;
  border: 0;
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.info-section h3 {
  margin-bottom: 12px;
  color: #756f69;
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.info-section dl {
  gap: 8px;
  padding: 7px 0;
  border-color: rgba(242, 236, 227, 0.04);
}

.info-section dt {
  color: #67615c;
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.info-section dd {
  color: #d6cec5;
  font-size: 11px;
}

.more-menu {
  padding: 5px;
  background: rgba(20, 20, 20, 0.98);
  backdrop-filter: blur(14px);
}

.more-menu button {
  min-height: 37px;
  border-radius: 7px;
  color: var(--ivory-soft);
  background: transparent;
}

.more-menu button:hover {
  color: var(--ivory);
  background: #21150f;
}

/* SALES / SERVICES / REPORTS --------------------------------------- */

.workspace-grid {
  gap: 13px;
  padding: 22px 28px 30px;
}

.pipeline-board {
  gap: 12px;
  padding: 20px 28px 30px;
}

.pipeline-column {
  padding: 13px;
  box-shadow: none;
}

.pipeline-column .card-heading h2 {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 650;
  letter-spacing: -0.02em;
}

.pipeline-card,
.message-row,
.task-row,
.automation-row,
.link-row {
  border-color: var(--line) !important;
  color: var(--ivory);
  background: var(--surface-3) !important;
}

.pipeline-card:hover,
.message-row:hover,
.link-row:hover {
  border-color: rgba(223, 100, 15, 0.3) !important;
  background: #1a1613 !important;
}

.pipeline-card span,
.pipeline-card small,
.message-row small,
.link-row small,
.automation-row small {
  color: #7d7771;
}

.pipeline-card b {
  color: var(--brass);
}

.service-card h2 {
  font-size: 20px;
}

.template-dropzone {
  border-color: rgba(223, 100, 15, 0.22);
  border-radius: 9px;
  color: var(--ivory);
  background: var(--surface-3);
}

.template-dropzone small {
  color: #77716b;
}

.template-dropzone.has-template {
  border-color: rgba(127, 154, 119, 0.33);
  background: #121812;
}

.template-dropzone.is-dragover {
  border-color: var(--orange);
  background: #21140d;
}

.report-bar div {
  background: #232323;
}

.report-bar i {
  background: linear-gradient(90deg, var(--orange), var(--burgundy));
}

/* EMPTY STATES ------------------------------------------------------- */

.empty-state {
  display: grid;
  justify-items: center;
  gap: 8px;
  padding: 24px 18px;
  color: #77716b;
  text-align: center;
}

.empty-state p {
  max-width: 260px;
  margin: 0;
  font-size: 11px;
  line-height: 1.5;
}

.empty-state-mark {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid rgba(184, 154, 97, 0.24);
  border-radius: 50%;
  color: var(--brass);
  background: #121212;
  font-size: 10px;
}

.empty-card {
  display: grid;
  justify-items: start;
  align-content: start;
  gap: 10px;
}

.empty-card h2,
.empty-card p {
  margin: 0;
}

.empty-orbit .empty-state,
.empty-map .empty-state {
  padding: 0;
}

/* MODALS / TOAST ----------------------------------------------------- */

.modal-backdrop {
  background: rgba(0, 0, 0, 0.76);
  backdrop-filter: blur(11px);
}

.edit-modal {
  overflow: hidden;
  border-color: rgba(184, 154, 97, 0.2);
  background: #101010;
  box-shadow: 0 38px 110px rgba(0, 0, 0, 0.68);
}

.edit-modal header,
.edit-modal footer {
  border-color: var(--line);
  background: #0b0b0b;
}

.edit-modal header h2 {
  color: var(--ivory);
}

.form-grid label span {
  color: #9d958d;
}

.toast {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 210px;
  border-color: rgba(184, 154, 97, 0.25);
  border-radius: 999px;
  color: #fff6ea;
  background: rgba(24, 18, 14, 0.97);
  box-shadow: 0 20px 56px rgba(0, 0, 0, 0.48);
}

.toast button {
  min-height: 30px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 999px;
  padding: 0 11px;
  color: #111;
  background: var(--ivory);
  font-size: 10px;
  font-weight: 700;
}

.toast button:hover {
  color: #fff;
  background: var(--orange);
}

a {
  color: #d68a61;
}

/* RESPONSIVE --------------------------------------------------------- */

@media (max-width: 1320px) {
  .home-system-layout {
    grid-template-columns: minmax(520px, 1fr) 270px;
  }

  .contacts-layout {
    grid-template-columns: 292px minmax(420px, 1fr) 275px;
  }

  .workspace-command-area {
    gap: 9px;
  }

  .save-status {
    display: none;
  }
}

@media (max-width: 1080px) {
  .home-system-layout {
    grid-template-columns: 1fr;
  }

  .system-summary {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .system-summary > .workspace-card {
    grid-column: 1 / -1;
  }

  .contacts-layout {
    grid-template-columns: 285px minmax(390px, 1fr);
  }

  .info-panel {
    display: none;
  }
}

@media (max-width: 820px) {
  .workspace-shell {
    grid-template-columns: 68px minmax(0, 1fr);
  }

  .sidebar {
    padding-inline: 7px;
  }

  .workspace-header {
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
  }

  .workspace-command-area {
    align-items: flex-end;
  }

  .workspace-actions button {
    padding-inline: 11px;
  }

  .workspace-actions .header-secondary {
    display: none;
  }

  .contacts-layout {
    grid-template-columns: 260px minmax(360px, 1fr);
  }
}

@media (max-width: 720px) {
  body::before {
    display: none;
  }

  .workspace-shell {
    display: block;
  }

  .sidebar {
    position: fixed;
    top: auto;
    right: 10px;
    bottom: 10px;
    left: 10px;
    z-index: 70;
    display: grid;
    grid-template-columns: auto 1fr auto;
    width: auto;
    height: 64px;
    padding: 7px;
    border: 1px solid var(--line-strong);
    border-radius: 18px;
    background: rgba(12, 12, 12, 0.92);
    box-shadow: 0 22px 54px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(20px);
  }

  .brand-mark.logo-mark,
  .quick-add,
  .help-button,
  .user-avatar,
  .nav-item span,
  .nav-item::after {
    display: none;
  }

  .nav-list {
    display: flex;
    justify-content: space-around;
    gap: 3px;
    overflow-x: auto;
  }

  .nav-item {
    min-width: 44px;
    min-height: 48px;
    padding: 0;
    border-radius: 13px;
  }

  .nav-item::before {
    top: auto;
    right: 13px;
    bottom: -7px;
    left: 13px;
    width: auto;
    height: 3px;
    border-radius: 999px 999px 0 0;
  }

  .workspace-page {
    min-height: 100vh;
    padding-bottom: 86px;
  }

  .workspace-header {
    position: sticky;
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 18px 16px 14px;
  }

  .workspace-header h1 {
    font-size: 31px;
  }

  .workspace-command-area {
    justify-content: flex-start;
  }

  .workspace-actions {
    justify-content: flex-start;
    width: 100%;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .workspace-actions .header-secondary {
    display: inline-flex;
  }

  .home-view-switch {
    padding: 13px 14px 0;
  }

  .home-tabs {
    width: 100%;
  }

  .home-system-layout,
  .workspace-grid,
  .pipeline-board {
    padding: 13px 14px 24px;
  }

  .system-summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .relationship-system,
  .world-map-panel {
    min-height: 535px;
  }

  .map-title p {
    display: none;
  }

  .map-title strong {
    font-size: 22px;
  }

  .world-map {
    inset: 78px 10px 12px;
  }

  .world-map-art {
    inset: 18px 10px 32px;
    width: calc(100% - 20px);
    height: calc(100% - 50px);
  }

  .contacts-layout {
    display: block;
    min-height: auto;
  }

  .people-panel {
    min-height: auto;
    border-right: 0;
  }

  .contact-stage {
    min-height: auto;
  }

  .hero-contact {
    grid-template-columns: 78px minmax(0, 1fr);
    column-gap: 16px;
    padding: 24px 18px 20px;
  }

  .profile-photo {
    width: 78px;
    height: 78px;
  }

  .hero-contact h2 {
    font-size: 27px;
  }

  .action-row {
    overflow-x: auto;
    flex-wrap: nowrap;
    padding-bottom: 3px;
  }

  .action-button {
    flex: 0 0 auto;
  }
}

@media (prefers-reduced-motion: reduce) {
  * {
    scroll-behavior: auto !important;
    transition: none !important;
    animation: none !important;
  }
}

/* FINAL V22 PRECISION PASS ------------------------------------------- */

:focus-visible {
  outline: 2px solid var(--orange-bright);
  outline-offset: 3px;
}

button:disabled,
input:disabled,
select:disabled,
textarea:disabled {
  cursor: not-allowed;
  opacity: 0.46;
}

.workspace-header,
.home-view-switch,
.home-system-layout,
.contacts-layout,
.workspace-grid,
.pipeline-board {
  contain: layout paint;
}

/* Typography is expressive only where hierarchy benefits from it. */
.workspace-card h2,
.campaign-card h2,
.service-card h2,
.activity-card h4,
.panel-header h1,
.info-header h2,
.map-title strong {
  font-family: var(--font-body);
  font-weight: 650;
  letter-spacing: -0.025em;
}

.workspace-header h1,
.hero-contact h2,
.metric-panel strong {
  font-family: var(--font-display);
}

/* Metrics stay calm and scannable at every width. */
.metric-panel strong {
  overflow-wrap: normal;
  white-space: nowrap;
}

.system-summary {
  align-content: start;
}

/* Cleaner map: the routes carry the story, not decorative coordinates. */
.map-coordinate-labels {
  display: none;
}

.bridge-routes {
  stroke-width: .8;
  stroke-dasharray: 2.5 8;
}

.map-marker span,
.map-marker small {
  pointer-events: none;
}

/* Prevent a selected contact from disappearing below the fixed mobile dock. */
.contact-stage,
.activity,
.info-panel {
  scroll-margin-bottom: 90px;
}

@media (max-width: 720px) {
  .workspace-header {
    position: relative;
    gap: 13px;
    padding: 20px 16px 16px;
  }

  .workspace-command-area,
  .workspace-actions {
    width: 100%;
  }

  .workspace-actions {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    overflow-x: auto;
    padding: 0 0 3px;
    scrollbar-width: none;
  }

  .workspace-actions::-webkit-scrollbar {
    display: none;
  }

  .workspace-actions button {
    flex: 0 0 auto;
    min-height: 42px;
  }

  .workspace-actions .header-primary,
  .workspace-actions .header-secondary {
    padding-inline: 17px;
  }

  .workspace-actions .header-utility {
    width: 42px;
    min-width: 42px;
  }

  .home-system-layout {
    gap: 12px;
  }

  .relationship-system {
    min-height: 510px;
  }

  .orbit-high {
    width: 192px;
    height: 192px;
  }

  .orbit-medium {
    width: 292px;
    height: 292px;
  }

  .orbit-low {
    width: 388px;
    height: 388px;

function emptyStore() {
  return {
    contacts: [],
    companies: [],
    deals: [],
    tasks: [],
    services: defaultServiceRecords(),
    automations: [
      { id: makeId(), title: "Create reminder after new lead", active: true },
      { id: makeId(), title: "Flag high-value deals over EUR 15,000", active: true },
      { id: makeId(), title: "Warn when follow-up date is missed", active: true }
    ],
    settings: { createdAt: new Date().toISOString() }
  };
}

function storeRecordCount(candidate) {
  if (!candidate || typeof candidate !== "object") return 0;
  return [
    candidate.contacts,
    candidate.companies,
    candidate.deals,
    candidate.tasks,
    candidate.services
  ].reduce((total, list) => total + (Array.isArray(list) ? list.length : 0), 0);
}

function parseStoredStore(raw) {
  if (!raw) return null;
  try {
    const parsed = JSON.parse(raw);
    if (parsed && Array.isArray(parsed.contacts) && Array.isArray(parsed.companies)) {
      return parsed;
    }
  } catch {
    return null;
  }
  return null;
}

function localRecoveryCandidates() {
  const candidates = [];
  try {
    for (let index = 0; index < localStorage.length; index += 1) {
      const key = localStorage.key(index);
      if (!key || !key.startsWith("balai-crm-store")) continue;
      const raw = localStorage.getItem(key);
      const parsed = parseStoredStore(raw);
      if (!parsed) continue;
      candidates.push({
        key,
        raw,
        parsed,
        records: storeRecordCount(parsed),
        updatedAt: Date.parse(parsed.settings?.updatedAt || parsed.settings?.createdAt || 0) || 0
      });
    }
  } catch {
    return [];
  }
  return candidates.sort((a, b) => b.records - a.records || b.updatedAt - a.updatedAt);
}

function loadStore() {
  try {
    const currentRaw = localStorage.getItem(storageKey);
    const current = parseStoredStore(currentRaw);

    if (current && storeRecordCount(current) > 0) {
      if (!localStorage.getItem(safetyBackupKey)) {
        localStorage.setItem(safetyBackupKey, currentRaw);
      }
      return normalizeStore(current);
    }

    const bestCandidate = localRecoveryCandidates()
      .find((candidate) => candidate.key !== storageKey && candidate.records > 0);

    if (bestCandidate) {
      localStorage.setItem(storageKey, bestCandidate.raw);
      if (!localStorage.getItem(safetyBackupKey)) {
        localStorage.setItem(safetyBackupKey, bestCandidate.raw);
      }
      startupRecoveryNotice = `Recovered ${bestCandidate.records} saved CRM records`;
      return normalizeStore(bestCandidate.parsed);
    }

    if (current) return normalizeStore(current);
  } catch {
    return emptyStore();
  }
  return emptyStore();
}

function normalizeStore(next) {
  return {
    contacts: (next.contacts || []).map((contact) => ({
      ...contact,
      country: contact.country || "Finland",
      status: contact.status || "Lead",
      priority: contact.priority || "Medium"
    })),
    companies: (next.companies || []).map((company) => ({
      ...company,
      location: company.location || "",
      country: company.country || "Finland",
      priority: company.priority || "Medium",
      image: company.image || "",
      mapPosition: normalizeMapPosition(company.mapPosition),
      orbitPosition: normalizeMapPosition(company.orbitPosition)
    })),
    deals: next.deals || [],
    tasks: next.tasks || [],
    services: normalizeServices(next.services),
    automations: next.automations || emptyStore().automations,
    settings: next.settings || {}
  };
}

function defaultServiceRecords() {
  return serviceBlueprints.map((service) => ({ ...service, template: null }));
}

function normalizeServices(items) {
  const source = Array.isArray(items) && items.length ? items : defaultServiceRecords();
  return source.map((service, index) => normalizeService(service, index));
}

function normalizeService(service, index = 0) {
  const raw = service || {};
  const fallback = serviceBlueprints[index] || {
    id: makeId(),
    type: "Service",
    title: "Untitled offer",
    description: "Describe this service or product."
  };
  const isLegacyTitle = typeof raw === "string";
  return {
    id: isLegacyTitle ? serviceSlug(raw) : raw.id || fallback.id || makeId(),
    type: serviceTypes.includes(raw.type) ? raw.type : fallback.type || "Service",
    title: isLegacyTitle ? raw : raw.title || fallback.title || "Untitled offer",
    description: isLegacyTitle ? "Create deals around this offer, attach companies, and track follow-up." : raw.description || fallback.description || "",
    template: normalizeTemplate(raw.template)
  };
}

function normalizeTemplate(template) {
  if (!template || typeof template !== "object" || !template.data) return null;
  return {
    name: template.name || "Template",
    type: template.type || "application/octet-stream",
    size: Number(template.size || 0),
    data: template.data,
    savedAt: template.savedAt || new Date().toISOString()
  };
}

function serviceSlug(value) {
  return String(value || "service")
    .toLowerCase()
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "") || makeId();
}

function persist(message = "Saved", undo = null) {
  try {
    const updatedAt = new Date().toISOString();
    store.settings = { ...(store.settings || {}), updatedAt, schemaVersion: 5 };
    localStorage.setItem(storageKey, JSON.stringify(store));
    state.lastSavedAt = updatedAt;
    saveRecoverySnapshot(store);
    flash(message, undo);
  } catch {
    flash("Storage full. Export your data now.");
  }
}

function flash(message, undo = null) {
  state.notice = message;
  state.undo = undo;
  render();
  const timeout = undo ? 5200 : 2300;
  setTimeout(() => {
    if (state.notice === message) {
      state.notice = "";
      state.undo = null;
      render();
    }
  }, timeout);
}

function openRecoveryDatabase() {
  return new Promise((resolve, reject) => {
    if (!("indexedDB" in window)) return reject(new Error("IndexedDB unavailable"));
    const request = indexedDB.open(recoveryDatabaseName, 1);
    request.onupgradeneeded = () => {
      const database = request.result;
      if (!database.objectStoreNames.contains(recoveryStoreName)) {
        database.createObjectStore(recoveryStoreName, { keyPath: "id" });
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveRecoverySnapshot(data) {
  try {
    const database = await openRecoveryDatabase();
    const transaction = database.transaction(recoveryStoreName, "readwrite");
    const snapshots = transaction.objectStore(recoveryStoreName);
    snapshots.put({ id: Date.now(), savedAt: new Date().toISOString(), data: JSON.stringify(data) });
    const keysRequest = snapshots.getAllKeys();
    keysRequest.onsuccess = () => {
      const keys = [...keysRequest.result].sort((a, b) => b - a);
      keys.slice(6).forEach((key) => snapshots.delete(key));
    };
    transaction.oncomplete = () => database.close();
  } catch {
    // Recovery snapshots are a silent safety layer; the CRM remains usable without them.
  }
}

async function readRecoverySnapshots() {
  try {
    const database = await openRecoveryDatabase();
    const snapshots = await new Promise((resolve, reject) => {
      const transaction = database.transaction(recoveryStoreName, "readonly");
      const request = transaction.objectStore(recoveryStoreName).getAll();
      request.onsuccess = () => resolve(request.result || []);
      request.onerror = () => reject(request.error);
      transaction.oncomplete = () => database.close();
    });
    return snapshots;
  } catch {
    return [];
  }
}

async function attemptIndexedRecovery() {
  if (indexedRecoveryAttempted || storeRecordCount(store) > 0) return;
  indexedRecoveryAttempted = true;

  const snapshots = await readRecoverySnapshots();
  const candidates = snapshots
    .map((snapshot) => {
      const parsed = parseStoredStore(snapshot?.data);
      return {
        parsed,
        savedAt: Date.parse(snapshot?.savedAt || 0) || 0,
        records: storeRecordCount(parsed)
      };
    })
    .filter((candidate) => candidate.parsed && candidate.records > 0)
    .sort((a, b) => b.records - a.records || b.savedAt - a.savedAt);

  const best = candidates[0];
  if (!best || storeRecordCount(store) > 0) return;

  store = normalizeStore(best.parsed);
  localStorage.setItem(storageKey, JSON.stringify(store));
  state.lastSavedAt = store.settings?.updatedAt || new Date().toISOString();
  state.notice = `Recovered ${best.records} records from a safety snapshot`;
  render();
}

function cloneStore() {
  return JSON.parse(JSON.stringify(store));
}

function totals() {
  const pipeline = store.deals.reduce((sum, deal) => sum + Number(deal.value || 0), 0);
  const openDeals = store.deals.filter((deal) => !["Client", "Lost"].includes(deal.stage)).length;
  const overdueTasks = store.tasks.filter((task) => task.dueDate && task.dueDate < today() && !task.done).length;
  return {
    pipeline,
    openDeals,
    overdueTasks,
    contacts: store.contacts.length,
    companies: store.companies.length
  };
}

function selectedContact() {
  return store.contacts.find((contact) => contact.id === state.selectedContactId) || store.contacts[0] || null;
}

function selectedCompany() {
  return store.companies.find((company) => company.id === state.selectedCompanyId) || store.companies[0] || null;
}

function selectedDeal() {
  return store.deals.find((deal) => deal.id === state.selectedDealId) || null;
}

function serviceRecords() {
  if (!Array.isArray(store.services) || !store.services.length) {
    store.services = defaultServiceRecords();
  }
  return store.services;
}

function serviceOptions() {
  return serviceRecords().map((service) => [service.title, service.title]);
}

function serviceById(id) {
  return serviceRecords().find((service) => service.id === id) || null;
}

function filteredContacts() {
  const query = state.query.trim().toLowerCase();
  return store.contacts.filter((contact) => {
    const company = companyName(contact.companyId);
    const haystack = [
      contact.firstName,
      contact.lastName,
      contact.email,
      contact.phone,
      contact.country,
      contact.role,
      contact.priority,
      company,
      contact.notes
    ]
      .join(" ")
      .toLowerCase();
    const countryMatch = state.country === "All" || contact.country === state.country;
    return countryMatch && haystack.includes(query);
  });
}

function filteredCompanies() {
  const query = state.query.trim().toLowerCase();
  return store.companies.filter((company) => {
    const haystack = [company.name, company.location, company.country, company.segment, company.priority, company.website, company.notes]
      .join(" ")
      .toLowerCase();
    const countryMatch = state.country === "All" || company.country === state.country;
    return countryMatch && haystack.includes(query);
  });
}

function filteredDeals() {
  const query = state.query.trim().toLowerCase();
  return store.deals.filter((deal) => {
    const haystack = [
      deal.title,
      deal.country,
      deal.service,
      deal.stage,
      companyName(deal.companyId),
      contactName(deal.contactId),
      deal.notes
    ]
      .join(" ")
      .toLowerCase();
    const countryMatch = state.country === "All" || deal.country === state.country;
    const stageMatch = state.stage === "All" || deal.stage === state.stage;
    return countryMatch && stageMatch && haystack.includes(query);
  });
}

function renderView() {
  const views = {
    home: renderHome,
    search: renderSearch,
    contacts: renderContacts,
    day: renderDay,
    comms: renderComms,
    sales: renderSales,
    marketing: renderMarketing,
    automation: renderAutomation,
    reports: renderReports
  };
  return (views[state.view] || renderHome)();
}

function header(title, subtitle, actions = "") {
  return `
    <header class="workspace-header">
      <div class="workspace-heading">
        <p class="eyebrow">BALAI CRM</p>
        <h1>${title}</h1>
        <p>${subtitle}</p>
      </div>
      <div class="workspace-command-area">
        <span class="save-status" title="Saved in this browser"><i></i>${state.lastSavedAt ? "Saved locally" : "Local workspace"}</span>
        <div class="workspace-actions">
          ${actions}
          <button class="header-utility" type="button" data-action="export" title="Export backup">${navIcon("download")}<span>Export</span></button>
          <button class="header-utility" type="button" data-action="import" title="Import backup">${navIcon("upload")}<span>Import</span></button>
        </div>
      </div>
    </header>
  `;
}

function renderHome() {
  const t = totals();
  return `
    ${header(
      "Welcome to BALAI",
      "Your relationship map for companies, people, deals, and follow-ups.",
      `<button class="header-primary" type="button" data-action="open-modal" data-modal="company">${navIcon("plus")} Add company</button>
       <button class="header-secondary" type="button" data-action="open-modal" data-modal="deal">${navIcon("sales")} Add deal</button>`
    )}
    <section class="home-view-switch">
      <div class="contact-tabs home-tabs">
        <button class="${state.homeMode === "orbit" ? "active" : ""}" type="button" data-action="set-home-mode" data-mode="orbit">Orbit Map</button>
        <button class="${state.homeMode === "world" ? "active" : ""}" type="button" data-action="set-home-mode" data-mode="world">World Map</button>
      </div>
    </section>
    <section class="home-system-layout">
      ${state.homeMode === "world" ? renderWorldMap() : renderOrbitMap()}
      <aside class="system-summary">
        ${metric("Companies", t.companies, "Company profiles")}
        ${metric("People", t.contacts, "Linked contacts")}
        ${metric("Open deals", t.openDeals, "Active opportunities")}
        ${metric("Pipeline", formatMoney(t.pipeline), "Total deal value")}
        <article class="workspace-card vault-card">
          <div class="card-heading">
            <div><p class="eyebrow">LOCAL VAULT</p><h2>Data protected</h2></div>
            <button type="button" data-action="export">Backup</button>
          </div>
          <p>Every edit is saved locally and mirrored into rolling recovery snapshots.</p>
          <div class="vault-status"><i></i><span>Browser storage active</span><strong>${store.settings?.updatedAt ? formatTime(store.settings.updatedAt) : "Ready"}</strong></div>
        </article>
      </aside>
    </section>
  `;
}

function renderOrbitMap() {
  return `
    <article class="relationship-system ${state.mapEditMode ? "is-editing" : ""}">
      <div class="map-title orbit-title">
        <span>BALAI HOME</span>
        <strong>Orbit Map</strong>
        <p>Companies orbit BALAI by priority. Drag bubbles from the menu when you want a custom layout.</p>
      </div>
      <div class="map-tools">
        <button class="map-tool-toggle" type="button" data-action="toggle-map-menu" aria-label="Orbit map options"><span class="dot-icon" aria-hidden="true"><i></i><i></i><i></i></span></button>
        ${state.mapMenuOpen ? `
          <div class="map-tool-menu">
            <button type="button" data-action="toggle-map-edit">${state.mapEditMode ? "Done placing markers" : "Edit marker positions"}</button>
            <button type="button" data-action="reset-map-positions">Reset marker positions</button>
          </div>
        ` : ""}
      </div>
      ${state.mapEditMode ? `<p class="map-edit-hint">Drag a company bubble to arrange the orbit. Release to save.</p>` : ""}
      <div class="orbit-ring orbit-high"></div>
      <div class="orbit-ring orbit-medium"></div>

function companyPlanets() {
  return priorities
    .flatMap((priority) => {
      const group = store.companies
        .filter((company) => (company.priority || "Medium") === priority)
        .sort((a, b) => a.name.localeCompare(b.name));
      return group.map((company, index) => companyPlanet(company, index, group.length));
    })
    .join("");
}

function companyPlanet(company, index, total) {
  const positionStyle = companyOrbitStyle(company, index, total);
  const size = companyPlanetSize(company.priority);
  const expanded = companyPlanetExpandedSize(company.priority);
  const contacts = store.contacts.filter((contact) => contact.companyId === company.id).length;
  return `
    <button
      class="company-planet ${priorityClass(company.priority)} ${company.orbitPosition ? "manual-orbit-position" : ""}"
      type="button"
      data-action="open-company"
      data-id="${company.id}"
      style="${positionStyle} --planet-size:${size}px; --planet-expanded:${expanded}px;"
      title="${escapeHtml(company.name)}"
    >
      ${companyPlanetVisual(company)}
      <strong>${escapeHtml(company.name || "Unnamed company")}</strong>
      <small>${company.priority || "Medium"} / ${contacts} people</small>
    </button>
  `;
}

function companyMapMarkers() {
  const points = store.companies.map((company) => ({ company, point: companyCoordinates(company) }));
  const buckets = new Map();
  points.forEach((item) => {
    const key = item.company.mapPosition ? `manual-${item.company.id}` : `${Math.round(item.point.x / 2)}-${Math.round(item.point.y / 2)}`;
    if (!buckets.has(key)) buckets.set(key, []);
    buckets.get(key).push(item);
  });
  buckets.forEach((items) => {
    if (items.length < 2 || items[0].company.mapPosition) return;
    items.forEach((item, index) => {
      const angle = (-90 + (index * 360) / items.length) * Math.PI / 180;
      const radius = Math.min(4.6, 2.0 + items.length * 0.55);
      item.point = cleanMapPoint(item.point.x + Math.cos(angle) * radius, item.point.y + Math.sin(angle) * radius);
    });
  });
  return points.map(({ company, point }) => companyMapMarker(company, point)).join("");
}

function companyMapMarker(company, point = companyCoordinates(company)) {

function companyMapVisual(company) {
  if (company.image) return `<i><img src="${company.image}" alt="${escapeHtml(company.name || "Company")}" /></i>`;

        <div class="more-wrap">

          ${state.moreOpen ? `<div class="more-menu"><button type="button" data-action="edit-selected-company">Edit</button><button type="button" data-action="add-company-picture">${company.image ? "Replace picture" : "Add picture"}</button><button class="danger-action" type="button" data-action="delete-company">Delete</button></div>` : ""}

      <article class="activity-card company-linked-card"><div><h4>Linked people</h4>${people.length ? people.map((contact) => `<button class="link-row" type="button" data-action="open-contact" data-id="${contact.id}">${contactName(contact.id)}<small>${contact.role || contact.email || "No role yet"}</small></button>`).join("") : `<p>No people linked yet.</p>`}</div><span class="card-icon">${navIcon("contacts")}</span></article>

  `;

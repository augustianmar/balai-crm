<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BALAI Customer Relationship Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  color-scheme: light;
  font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  color: #172136;
  background: #f4efe5;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-body: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --sidebar: #071d3a;
  --sidebar-muted: #a9b0bc;
  --green: #9bbf9e;
  --line: #e2d8c9;
  --soft: #fbf8f1;
  --cream: #f4efe5;
  --paper: #fffdf8;
  --text-muted: #76716b;
  --orange: #bf853d;
  --blue: #0b386c;
  --navy: #08264b;
  --gold: #b9853a;
  --shadow: 0 18px 48px rgba(8, 38, 75, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, rgba(185, 133, 58, 0.12), transparent 28rem),
    var(--cream);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.crm-shell {
  display: grid;
  grid-template-columns: 72px minmax(260px, 360px) minmax(380px, 1fr) minmax(270px, 330px);
  min-height: 100vh;
  background: var(--paper);
}

.sidebar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 10px;
  color: #fff;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%),
    var(--sidebar);
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 0;
  border-radius: 7px;
  color: var(--gold);
  background: #fffaf1;
  font-size: 25px;
  font-weight: 800;
  letter-spacing: 0;
  overflow: hidden;
}

.logo-mark img {
  width: 86%;
  height: 86%;
  object-fit: contain;
}

.quick-add {
  width: 34px;
  height: 34px;
  margin: 0 0 8px;
  border: 0;
  border-radius: 50%;
  color: var(--navy);
  background: linear-gradient(135deg, #fffaf1, #dcc193);
  box-shadow: 0 7px 18px rgba(0, 0, 0, 0.2);
  font-size: 26px;
  line-height: 1;
}

.nav-list {
  display: grid;
  gap: 5px;
  width: 100%;
}

.nav-item {
  display: grid;
  justify-items: center;
  gap: 3px;
  width: 100%;
  border: 0;
  border-radius: 6px;
  padding: 8px 4px;
  color: #d7dde3;
  background: transparent;
}

.nav-item span {
  max-width: 62px;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10px;
  font-weight: 700;
}

.nav-item.active,
.nav-item:hover {
  color: #fffaf1;
  background: rgba(255, 250, 241, 0.12);
}

.help-button,
.user-avatar {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  margin-top: auto;
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 50%;
  color: #fff;
  background: transparent;
  font-weight: 800;
}

.user-avatar {
  margin-top: 6px;
  border: 0;
  color: var(--navy);
  background: linear-gradient(135deg, #fffaf1, #d2ad71);
  font-size: 11px;
}

.people-panel,
.contact-stage,
.info-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--paper);
}

.people-panel {
  display: flex;
  flex-direction: column;
}

.panel-header,
.stage-toolbar,
.info-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 72px;
  padding: 17px 24px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  margin: 0 0 2px;
  color: var(--gold);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
h3,
h4,
p {
  margin-top: 0;
}

h1,
h2,
h3,
h4,
.hero-contact h2 {
  color: var(--navy);
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.01em;
}

h1 {
  margin-bottom: 0;
  font-size: 22px;
  line-height: 1.1;
}

.header-actions {
  display: flex;
  gap: 9px;
}

.header-actions button,
.mini-button,
.close-button {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: 50%;
  color: #252a30;
  background: transparent;
}

.header-actions button:hover,
.mini-button.active,
.mini-button:hover {
  background: #f0e7d8;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 22px 8px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text-muted);
  background: var(--soft);
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  color: var(--navy);
  background: transparent;
}

.market-filter {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 3px 22px 10px;
}

.market-filter button {
  flex: 0 0 auto;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 11px;
  color: #675f54;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.market-filter button.active,
.market-filter button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.quick-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 22px 10px;
}

.metric-card {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 9px;
  background: var(--paper);
}

.metric-card span,
.metric-card strong {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.metric-card span {
  margin-bottom: 2px;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 800;
}

.metric-card strong {
  color: var(--navy);
  font-size: 14px;
}

.select-all {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 8px 18px 12px;
  border: 0;
  color: var(--navy);
  background: transparent;
  text-align: left;
}

.select-all span {
  width: 42px;
  height: 42px;
  border: 2px solid var(--line);
  border-radius: 50%;
}

.contact-list {
  overflow: auto;
  padding: 0 10px 18px;
}

.contact-row {
  display: grid;
  grid-template-columns: 46px minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  width: 100%;
  border: 0;
  border-radius: 8px;
  padding: 10px 10px;
  color: var(--navy);
  background: transparent;
  text-align: left;
}

.contact-row:hover,
.contact-row.selected {
  background: #f3ebdc;
}

.mini-avatar,
.profile-photo {
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: #fff;
  background:
    radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.78), transparent 20%),
    var(--avatar-color);
  font-weight: 800;
}

.mini-avatar {
  width: 42px;
  height: 42px;
  font-size: 13px;
}

.contact-copy {
  min-width: 0;
}

.contact-copy strong,
.contact-copy small {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.contact-copy strong {
  font-size: 14px;
}

.contact-copy small {
  color: var(--text-muted);
  font-size: 11px;
}

.row-meta {
  display: grid;
  justify-items: end;
  gap: 5px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #68727c;
  font-size: 11px;
  font-weight: 800;
}

.status-pill::after,
.segmented span {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  content: "";
}

.status-pill.lead::after,
.lead-dot {
  background: var(--orange);
}

.status-pill.client::after,
.client-dot {
  background: var(--blue);
}

.status-pill.all::after,
.all-dot {
  background: #111821;
}

.other-dot {
  background: #cdd4da;
}

.priority-pill {
  border-radius: 999px;
  padding: 3px 7px;
  color: #5b6570;
  background: #efe8db;
  font-size: 10px;
  font-weight: 900;
}

.priority-pill.high {
  color: #6f4214;
  background: #f7e4c8;
}

.priority-pill.medium {
  color: #304f37;
  background: #e7efe2;
}

.priority-pill.low {
  color: #59636d;
  background: #ece7df;
}

.high-dot {
  background: var(--gold);
}

.medium-dot {
  background: var(--green);
}

.low-dot {
  background: #9ba5ad;
}

.contact-stage {
  display: flex;
  flex-direction: column;
  background: var(--cream);
}

.contact-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  padding: 14px 18px 0;
}

.contact-tabs button {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 7px;
  color: #6b6258;
  background: #fffdf8;
  font-weight: 900;
}

.contact-tabs button.active,
.contact-tabs button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.stage-toolbar {
  justify-content: center;
  position: relative;
}

.segmented {
  display: flex;
  gap: 8px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #f6efe2;
}

.segmented button {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 82px;
  border: 0;
  border-radius: 999px;
  padding: 7px 13px;
  color: #8c8173;
  background: transparent;
  font-size: 12px;
  font-weight: 800;
}

.segmented button.active {
  color: var(--navy);
  background: #fffdf8;
  box-shadow: 0 3px 12px rgba(8, 38, 75, 0.08);
}

.close-button {
  position: absolute;
  right: 22px;
  font-size: 26px;
}

.hero-contact {
  display: grid;
  justify-items: center;
  padding: 42px 24px 34px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, #fffdf8 0%, #fbf5ea 100%);
}

.profile-photo {
  width: 124px;
  height: 124px;
  margin-bottom: 20px;
  border: 5px solid #fffdf8;
  box-shadow: 0 12px 30px rgba(8, 38, 75, 0.13);
  font-size: 31px;
}

.avatar-image {
  overflow: hidden;
  background: #efe8db;
}

.avatar-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.company-avatar,
.company-photo {
  background:
    radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.72), transparent 22%),
    linear-gradient(135deg, var(--navy), #174977 58%, var(--gold));
}

.company-image {
  border-color: rgba(255, 253, 248, 0.96);
  background: #efe8db;
}

.company-photo {
  color: #fffaf1;
  font-family: var(--font-display);
  font-size: 40px;
  box-shadow:
    0 16px 36px rgba(8, 38, 75, 0.16),
    0 0 0 1px rgba(185, 133, 58, 0.18);
}

.account-label {
  margin-bottom: 9px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
}

.hero-contact h2 {
  margin-bottom: 3px;
  font-size: clamp(27px, 3vw, 36px);
  line-height: 1.1;
}

.hero-contact p {
  margin-bottom: 24px;
  color: var(--text-muted);
}

.deal-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: -8px 0 22px;
}

.deal-strip span {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 10px;
  color: #3e4852;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
}

.more-wrap {
  position: relative;
}

.more-menu {
  position: absolute;
  right: 0;
  z-index: 10;
  display: grid;
  width: 168px;
  margin-top: 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffdf8;
  box-shadow: 0 18px 42px rgba(8, 38, 75, 0.14);
  overflow: hidden;
}

.more-menu button {
  border: 0;
  padding: 11px 13px;
  color: var(--navy);
  background: #fffdf8;
  text-align: left;
  font-size: 13px;
  font-weight: 800;
}

.more-menu button:hover {
  background: #f3ebdc;
}

.action-button {
  display: grid;
  justify-items: center;
  gap: 7px;
  min-width: 62px;
  border: 0;
  color: #4d463f;
  background: transparent;
  font-size: 12px;
  font-weight: 800;
}

.action-button span {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(226, 216, 201, 0.9);
  background: linear-gradient(180deg, #fffdf8, #efe7d8);
  color: var(--navy);
  font-size: 18px;
  box-shadow: 0 8px 18px rgba(8, 38, 75, 0.07);
}

.action-button:hover span {
  border-color: #ceb386;
  background: linear-gradient(180deg, #fffaf1, #e3d2b8);
  box-shadow: 0 10px 22px rgba(8, 38, 75, 0.11);
}

.activity {
  flex: 1;
  overflow: auto;
  padding: 26px clamp(22px, 5vw, 44px) 42px;
}

.activity-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.activity-header h3 {
  margin: 0;
  color: #59636d;
  font-size: 14px;
  font-weight: 600;
}

.activity-header div {
  display: flex;
  gap: 5px;
}

.activity-card {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
  padding: 21px 22px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(251, 246, 237, 0.94));
  box-shadow: 0 16px 40px rgba(8, 38, 75, 0.07);
}

.activity-card h4 {
  margin-bottom: 4px;
  font-size: 20px;
}

.activity-card p {
  margin-bottom: 5px;
  color: #4e5963;
  font-size: 14px;
}

.activity-card button {
  border: 0;
  padding: 0;
  color: #2484c6;
  background: transparent;
  font-size: 13px;
  font-weight: 800;
}

.company-linked-card {
  align-items: flex-start;
}

.company-linked-card > div {
  width: 100%;
}

.link-row {
  display: grid;
  width: 100%;
  margin-top: 8px;
  border: 1px solid var(--line) !important;
  border-radius: 7px;
  padding: 10px 12px !important;
  color: var(--navy) !important;
  background: #fbf6ed !important;
  text-align: left;
}

.link-row:hover {
  border-color: #ceb386 !important;
  background: #f4eadb !important;
}

.link-row small {
  color: var(--text-muted);
  font-size: 12px;
}

.next-step-card {
  border-color: #d6e8ce;
  background: linear-gradient(180deg, #fffdf8, #f7f0e4);
}

.workspace-shell {
  grid-template-columns: 72px minmax(0, 1fr);
}

.contacts-layout {
  display: grid;
  grid-template-columns: minmax(260px, 360px) minmax(380px, 1fr) minmax(270px, 330px);
  min-height: calc(100vh - 92px);
}

.crm-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--paper);
}

.panel-header.compact {
  min-height: 72px;
}

.panel-header.compact button {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 50%;
  background: #f1e6d5;
}

.workspace-page {
  min-width: 0;
  min-height: 100vh;
  overflow: auto;
  background:
    radial-gradient(circle at 100% 0%, rgba(185, 133, 58, 0.1), transparent 24rem),
    var(--cream);
}

.workspace-header {
  position: relative;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 92px;
  padding: 24px 30px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(255, 253, 248, 0.9)),
    radial-gradient(circle at 18% 0%, rgba(185, 133, 58, 0.12), transparent 20rem);
  box-shadow: 0 14px 34px rgba(8, 38, 75, 0.06);
  backdrop-filter: blur(14px);
}

.workspace-header h1 {
  margin-bottom: 5px;
  font-size: 34px;
}

.workspace-header p {
  margin-bottom: 0;
  color: var(--text-muted);
}

.workspace-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 9px;
}

.workspace-actions button,
.workspace-card button,
.campaign-card button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 12px;
  color: var(--navy);
  background: linear-gradient(180deg, #fffdf8, #fbf6ed);
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 5px 14px rgba(8, 38, 75, 0.04);
}

.filter-row button {
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 12px;
  color: #6b6258;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.filter-row button.active,
.filter-row button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.workspace-actions button:hover,
.workspace-card button:hover,
.campaign-card button:hover {
  border-color: #ceb386;
  background: #f4eadb;
  box-shadow: 0 8px 20px rgba(8, 38, 75, 0.08);
}

.workspace-grid {
  display: grid;
  gap: 18px;
  padding: 22px 30px 0;
}

.home-view-switch {
  padding: 22px 30px 0;
}

.home-tabs {
  width: min(420px, 100%);
  padding: 0;
}

.home-system-layout {
  display: grid;
  grid-template-columns: minmax(520px, 1fr) minmax(260px, 360px);
  gap: 22px;
  padding: 28px 30px;
}

.relationship-system {
  position: relative;
  min-height: 660px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    radial-gradient(circle at 50% 50%, rgba(185, 133, 58, 0.13), transparent 9rem),
    radial-gradient(circle at center, rgba(255, 253, 248, 0.98) 0 12%, rgba(244, 239, 229, 0.54) 43%, rgba(255, 253, 248, 0.94) 100%),
    linear-gradient(135deg, #fffdf8, #f4efe5);
  box-shadow: 0 24px 70px rgba(8, 38, 75, 0.1);
}

.orbit-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px solid rgba(185, 133, 58, 0.16);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(185, 133, 58, 0.035);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.orbit-high {
  width: 280px;
  height: 280px;
}

.orbit-medium {
  width: 430px;
  height: 430px;
}

.orbit-low {
  width: 560px;
  height: 560px;
}

.system-core {
  position: absolute;
  top: 50%;
  left: 50%;
  z-index: 5;
  display: grid;
  place-items: center;
  box-sizing: border-box;
  width: 98px;
  height: 98px;
  overflow: hidden;
  border: 1px solid rgba(185, 133, 58, 0.38);
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 45%, rgba(255, 253, 248, 1), rgba(251, 246, 237, 0.97) 74%);
  box-shadow:
    0 22px 54px rgba(8, 38, 75, 0.12),

.subtle-button,
.button-link,
.service-actions button {
  display: inline-grid;
  place-items: center;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 13px;
  color: var(--navy);
  background: rgba(255, 253, 248, 0.94);
  text-decoration: none;
  font-weight: 850;
}

.subtle-button:hover,
.button-link:hover,
.service-actions button:hover {
  border-color: #ceb386;
  background: #f4eadb;
}

.template-dropzone {
  display: grid;
  gap: 4px;
  border: 1px dashed rgba(185, 133, 58, 0.38);
  border-radius: 8px;
  padding: 14px;
  color: var(--navy);
  background:
    linear-gradient(180deg, rgba(255, 253, 248, 0.76), rgba(251, 246, 237, 0.72));
  box-shadow: inset 0 0 0 1px rgba(255, 253, 248, 0.58);
}

.template-dropzone span {
  color: var(--gold);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.template-dropzone strong {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.template-dropzone small {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 750;
}

.template-dropzone.has-template {
  border-style: solid;
  border-color: rgba(155, 191, 158, 0.48);
  background:
    linear-gradient(180deg, rgba(251, 253, 248, 0.92), rgba(239, 246, 233, 0.76));
}

.template-dropzone.is-dragover {
  border-color: var(--gold);
  background: #fff7e8;
  box-shadow:
    inset 0 0 0 1px rgba(185, 133, 58, 0.16),
    0 14px 30px rgba(8, 38, 75, 0.08);
}

.automation-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 20px;
  align-items: center;
  padding: 15px 0;
  border-bottom: 1px solid var(--line);
}

.automation-row:last-child {
  border-bottom: 0;
}

.automation-row span {
  min-width: 0;
}

.automation-row strong,
.automation-row small {
  display: block;
}

.automation-row small {
  color: var(--text-muted);
}

.toggle {
  display: inline-flex;
  align-items: center;
  width: 48px;
  height: 28px;
  border: 0;
  border-radius: 999px;
  padding: 3px;
  background: #d7ccbb;
}

.toggle i {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #fffdf8;
  transition: transform 0.16s ease;
}

.toggle.on {
  background: var(--gold);
}

.toggle.on i {
  transform: translateX(20px);
}

.report-bars {
  display: grid;
  gap: 15px;
}

.report-bar {
  display: grid;
  grid-template-columns: 120px minmax(0, 1fr) 120px;
  gap: 14px;
  align-items: center;
}

.report-bar span,
.report-bar strong {
  font-size: 13px;
}

.report-bar div {
  overflow: hidden;
  height: 10px;
  border-radius: 999px;
  background: #efe5d5;
}

.report-bar i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--navy), var(--gold));
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  padding: 22px;
  background: rgba(7, 29, 58, 0.52);
}

.edit-modal {
  width: min(820px, 100%);
  max-height: min(860px, calc(100vh - 44px));
  overflow: auto;
  border-radius: 8px;
  background: #fffdf8;
  box-shadow: 0 26px 70px rgba(7, 29, 58, 0.28);
}

.edit-modal header,
.edit-modal footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
}

.edit-modal footer {
  justify-content: flex-end;
  border-top: 1px solid var(--line);
  border-bottom: 0;
}

.edit-modal header button,
.edit-modal footer button {
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 10px 14px;
  color: var(--navy);
  background: #fffdf8;
  font-weight: 800;
}

.edit-modal footer button[type="submit"],
.edit-modal footer button:last-child {
  color: #fff;
  background: var(--navy);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 22px;
}

.form-grid label {
  display: grid;
  gap: 6px;
}

.form-grid label span {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 900;
}

.form-grid input,
.form-grid select,
.form-grid textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 11px 12px;
  outline: 0;
  color: var(--navy);
  background: #fbf6ed;
}

.form-grid input:focus,
.form-grid select:focus,
.form-grid textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(185, 133, 58, 0.14);
}

.form-grid textarea {
  min-height: 88px;
  resize: vertical;
}

.form-grid .wide {
  grid-column: 1 / -1;
}

.hidden-input {
  display: none;
}

.toast {
  position: fixed;
  right: 22px;
  bottom: 22px;
  z-index: 60;
  border-radius: 8px;
  padding: 13px 16px;
  color: #fff;
  background: var(--navy);
  box-shadow: var(--shadow);
  font-weight: 800;
}

.card-icon {
  display: grid;
  place-items: center;
  flex: 0 0 34px;
  width: 34px;
  height: 34px;
  border: 2px solid var(--gold);
  border-radius: 7px;
  color: var(--navy);
}

.compact-card {
  display: block;
}

.compact-card strong {
  display: block;
  margin-bottom: 2px;
  font-size: 30px;
}

.info-panel {
  border-right: 0;
}

.info-header {
  justify-content: flex-start;
  gap: 12px;
}

.info-header > span {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  color: var(--navy);
}

.info-header h2 {
  margin: 0;
  font-size: 21px;
}

.info-header p {
  margin: 0;
  color: var(--text-muted);
  font-size: 13px;
}

.info-section {
  padding: 27px 28px 22px;
  border-bottom: 1px solid var(--line);
}

.info-section h3 {
  margin-bottom: 19px;
  font-size: 15px;
}

.info-section dl {
  margin: 0 0 16px;
}

.info-section dt {
  margin-bottom: 3px;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
}

.info-section dd {
  margin: 0;
  color: var(--navy);
  font-size: 14px;
}

.empty-state {
  margin: 18px 12px;
  color: var(--text-muted);
  font-size: 14px;
}

@media (max-width: 1100px) {
  .crm-shell {
    grid-template-columns: 68px minmax(240px, 320px) 1fr;
  }

  .workspace-shell {
    grid-template-columns: 68px minmax(0, 1fr);
  }

  .info-panel {
    display: none;
  }

  .contacts-layout {
    grid-template-columns: minmax(240px, 320px) 1fr;
  }

  .home-system-layout {
    grid-template-columns: 1fr;
  }

  .system-summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .metrics-grid,
  .three-column,
  .search-results,
  .market-board {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 780px) {
  .crm-shell {
    grid-template-columns: 60px 1fr;
  }

  .workspace-shell {
    grid-template-columns: 60px minmax(0, 1fr);
  }

  .people-panel {
    min-height: 44vh;
  }

  .contact-stage {
    grid-column: 1 / -1;
  }

  .sidebar {
    grid-row: 1 / span 2;
    padding-inline: 7px;
  }

  .nav-item {
    padding-block: 7px;
  }

  .nav-item span {
    display: none;
  }

  .panel-header,
  .stage-toolbar {
    min-height: 64px;
    padding: 14px 16px;
  }

  .segmented button {
    min-width: auto;
    padding-inline: 10px;
  }

  .hero-contact {
    padding-top: 30px;
  }

  .profile-photo {
    width: 98px;
    height: 98px;
  }

  .workspace-header {
    align-items: flex-start;
    flex-direction: column;
    padding: 18px;
  }

  .workspace-grid,
  .pipeline-board {
    grid-template-columns: 1fr;
    padding-inline: 18px;
  }

  .home-system-layout {
    overflow-x: auto;
    padding-inline: 18px;
  }

  .relationship-system {
    min-width: 640px;
    min-height: 620px;
  }

  .world-map-panel {
    min-width: 640px;
    min-height: 620px;
  }

  .world-map {
    inset: 108px 24px 34px;
  }

  .system-summary {
    grid-template-columns: 1fr;
  }

  .contacts-layout {
    grid-template-columns: 1fr;
  }

  .contact-stage {
    grid-column: auto;
  }

  .search-page-card {
    margin-inline: 18px;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .report-bar {
    grid-template-columns: 1fr;
  }
}

:root {
  color-scheme: light;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  color: #1f252b;
  background: #eef1f3;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  --sidebar: #111821;
  --sidebar-muted: #9ba5ad;
  --green: #7ac943;
  --line: #e7eaee;
  --soft: #f7f8fa;
  --text-muted: #7b858f;
  --orange: #ff982a;
  --blue: #19a7f5;
  --shadow: 0 18px 45px rgba(20, 30, 40, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
}

button,
input {

}

button {
  cursor: pointer;
}

svg {

  height: 20px;

  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.crm-shell {
  display: grid;

  min-height: 100vh;
  background: #fff;
}

.sidebar {

  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 10px;
  color: #fff;
  background: var(--sidebar);
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border-radius: 8px;
  color: var(--green);
  font-size: 25px;
  font-weight: 800;
  letter-spacing: 0;
}

.quick-add {
  width: 34px;
  height: 34px;
  margin: 0 0 8px;
  border: 0;
  border-radius: 50%;
  color: var(--green);
  background: #fff;
  box-shadow: 0 7px 18px rgba(0, 0, 0, 0.22);
  font-size: 26px;
  line-height: 1;
}

.nav-list {

}

.nav-item {

}

}

.nav-item:hover {

  background: #24303c;
}

.help-button,
.user-avatar {

  width: 32px;
  height: 32px;

  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 50%;
  color: #fff;
  background: transparent;
  font-weight: 800;
}

.user-avatar {
  margin-top: 6px;
  border: 0;
  color: #21301c;
  background: linear-gradient(135deg, #9be46d, #f6d36f);

}

.people-panel,
.contact-stage,
.info-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: #fff;
}

.people-panel {
  display: flex;

}

.panel-header,
.stage-toolbar,
.info-header {

.eyebrow {

h1,
h2,
h3,
h4,

.header-actions button:hover,

.search-box {

}

.market-filter {

.metric-card span,

.metric-card span {

.metric-card strong {

.select-all {

}

.select-all span {

}

.contact-list {

.contact-row {

.contact-row:hover,

.status-pill::after,

.status-pill.lead::after,

  background: var(--orange);

.status-pill.client::after,

.status-pill.all::after,

.info-header {

.info-header > span {

.info-header h2 {

.info-header p {

.info-section {

.info-section dl {

.empty-state {

  }

  .hero-contact {
    padding-top: 30px;
  }

  .profile-photo {
    width: 98px;
    height: 98px;
  }
}

const navItems = [
  ["Search", "search"],
  ["Home", "home"],

const state = {
  selectedId: "bessie",
  query: "",
  status: "All",
  market: "All"
};

const app = document.querySelector("#app");

function selectedContact() {
  return contacts.find((contact) => contact.id === state.selectedId) || contacts[0];
}

function filteredContacts() {
  const normalizedQuery = state.query.trim().toLowerCase();
  return contacts.filter((contact) => {
    const matchesStatus = state.status === "All" || contact.status === state.status;
    const matchesMarket = state.market === "All" || contact.market === state.market;
    const haystack = [
      contact.firstName,
      contact.lastName,
      contact.company,
      contact.email,
      contact.market,
      contact.status,
      contact.priority,
      contact.service,
      contact.source
    ]
      .join(" ")
      .toLowerCase();
    return matchesStatus && matchesMarket && haystack.includes(normalizedQuery);
  });
}

function marketList() {
  return ["All", ...new Set(contacts.map((contact) => contact.market))];
}

function summary() {
  const visible = filteredContacts();
  const pipeline = visible.reduce((total, contact) => total + contact.value, 0);
  const leads = visible.filter((contact) => contact.status === "Lead").length;
  const clients = visible.filter((contact) => contact.status === "Client").length;
  const highPriority = visible.filter((contact) => contact.priority === "High").length;
  return { visible, pipeline, leads, clients, highPriority };
}

function initialsIcon(name) {
  const letters = name
    .split(" ")
    .map((part) => part[0])
    .join("")
    .slice(0, 2);
  return `<span aria-hidden="true">${letters}</span>`;
}

function render() {

          <h2>${contact.firstName} ${contact.lastName}</h2>
          <p>${contact.email}</p>
          <div class="deal-strip">
            <span>${formatMoney(contact.value)}</span>
            <span>${contact.priority} priority</span>
            <span>${contact.lastTouch}</span>
          </div>
          <div class="action-row">
            ${["Call", "Text", "Email", "Tag", "Note", "More"]
              .map(
                (action) => `
                  <button class="action-button" type="button">
                    <span>${actionIcon(action)}</span>
                    ${action}

                `
              )
              .join("")}
          </div>
        </section>

        <section class="activity">
          <div class="activity-header">
            <h3>Contact activity</h3>
            <div>
              <button type="button" class="mini-button active" title="Cards view">${navIcon("card")}</button>
              <button type="button" class="mini-button" title="Timeline view">${navIcon("clock")}</button>
            </div>
          </div>
          <article class="activity-card next-step-card">
            <div>
              <h4>Next best action</h4>
              <p>${contact.nextStep}</p>
              <button type="button">Mark as planned</button>
            </div>
            <span class="card-icon">${navIcon("task")}</span>
          </article>
          <article class="activity-card">
            <div>
              <h4>Tasks</h4>
              <p>${contact.tasks[0]}</p>

          ["Market", contact.market],
          ["Status", contact.status]
        ])}
        ${infoSection("Commercial", [
          ["Service fit", contact.service],

function renderContactRow(contact) {
  return `
    <button class="contact-row ${state.selectedId === contact.id ? "selected" : ""}" type="button" data-contact-id="${contact.id}">
      <span class="mini-avatar" style="--avatar-color: ${contact.color}">${contact.avatar}</span>
      <span class="contact-copy">
        <strong>${contact.firstName} ${contact.lastName}</strong>
        <small>${contact.company}</small>
        <small>${contact.market} / ${formatMoney(contact.value)}</small>
      </span>
      <span class="row-meta">
        <span class="status-pill ${contact.status.toLowerCase()}">${contact.status}</span>
        <span class="priority-pill ${contact.priority.toLowerCase()}">${contact.priority}</span>
      </span>
    </button>
  `;
}

function metricCard(label, value) {
  return `
    <div class="metric-card">
      <span>${label}</span>
      <strong>${value}</strong>
    </div>
  `;
}

function infoSection(title, rows) {
  return `
    <section class="info-section">
      <h3>${title}</h3>
      ${rows
        .map(
          ([label, value]) => `
            <dl>
              <dt>${label}</dt>
              <dd>${value}</dd>
            </dl>
          `
        )
        .join("")}
    </section>
  `;
}

function bindEvents() {
  document.querySelectorAll("[data-contact-id]").forEach((button) => {
    button.addEventListener("click", () => {
      state.selectedId = button.dataset.contactId;
      render();
    });
  });

  document.querySelectorAll("[data-status]").forEach((button) => {
    button.addEventListener("click", () => {
      state.status = button.dataset.status;
      const firstVisible = filteredContacts()[0];
      if (firstVisible) {
        state.selectedId = firstVisible.id;
      }
      render();
    });
  });

  document.querySelectorAll("[data-market]").forEach((button) => {
    button.addEventListener("click", () => {
      state.market = button.dataset.market;
      const firstVisible = filteredContacts()[0];
      if (firstVisible) {
        state.selectedId = firstVisible.id;
      }
      render();
    });
  });

  document.querySelector("#searchInput").addEventListener("input", (event) => {
    state.query = event.target.value;
    const firstVisible = filteredContacts()[0];
    if (firstVisible) {
      state.selectedId = firstVisible.id;
    }
    render();
  });
}

  const icons = {
    search: `<svg viewBox="0 0 24 24"><path d="m21 21-4.2-4.2m2-5.3a7.3 7.3 0 1 1-14.6 0 7.3 7.3 0 0 1 14.6 0Z"/></svg>`,

    contacts: `<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.8"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/></svg>`,
    day: `<svg viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18"/><rect x="3" y="5" width="18" height="16" rx="2"/></svg>`,

    automation: `<svg viewBox="0 0 24 24"><path d="m13 2-8 12h7l-1 8 8-12h-7Z"/></svg>`,

    info: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>`
  };
  return icons[key] || initialsIcon(key);
}

function actionIcon(action) {
  const icons = {
    Call: `<svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.4 19.4 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.8a2 2 0 0 1-.4 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>`,
    Text: `<svg viewBox="0 0 24 24"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"/></svg>`,
    Email: `<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>`,
    Tag: `<svg viewBox="0 0 24 24"><path d="M20 13 11 22 2 13V4h9l9 9Z"/><path d="M7.5 8.5h.01"/></svg>`,
    Note: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>`,
    More: `<svg viewBox="0 0 24 24"><path d="M5 12h.01M12 12h.01M19 12h.01"/></svg>`
  };
  return icons[action];
}

function formatMoney(value) {
  return `EUR ${value.toLocaleString("en-US")}`;
}

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, (character) => {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[character];
  });
}

render();

    </script>

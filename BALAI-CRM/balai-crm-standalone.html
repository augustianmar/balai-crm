<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BALAI Customer Relationship Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  color-scheme: light;
  font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  color: #172136;
  background: #f4efe5;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-body: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --sidebar: #071d3a;
  --sidebar-muted: #a9b0bc;
  --green: #9bbf9e;
  --line: #e2d8c9;
  --soft: #fbf8f1;
  --cream: #f4efe5;
  --paper: #fffdf8;
  --text-muted: #76716b;
  --orange: #bf853d;
  --blue: #0b386c;
  --navy: #08264b;
  --gold: #b9853a;
  --shadow: 0 18px 48px rgba(8, 38, 75, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, rgba(185, 133, 58, 0.12), transparent 28rem),
    var(--cream);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.crm-shell {
  display: grid;
  grid-template-columns: 72px minmax(260px, 360px) minmax(380px, 1fr) minmax(270px, 330px);
  min-height: 100vh;
  background: var(--paper);
}

.sidebar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 10px;
  color: #fff;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%),
    var(--sidebar);
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 0;
  border-radius: 7px;
  color: var(--gold);
  background: #fffaf1;
  font-size: 25px;
  font-weight: 800;
  letter-spacing: 0;
  overflow: hidden;
}

.logo-mark img {
  width: 86%;
  height: 86%;
  object-fit: contain;
}

.quick-add {
  width: 34px;
  height: 34px;
  margin: 0 0 8px;
  border: 0;
  border-radius: 50%;
  color: var(--navy);
  background: linear-gradient(135deg, #fffaf1, #dcc193);
  box-shadow: 0 7px 18px rgba(0, 0, 0, 0.2);
  font-size: 26px;
  line-height: 1;
}

.nav-list {
  display: grid;
  gap: 5px;
  width: 100%;
}

.nav-item {
  display: grid;
  justify-items: center;
  gap: 3px;
  width: 100%;
  border: 0;
  border-radius: 6px;
  padding: 8px 4px;
  color: #d7dde3;
  background: transparent;
}

.nav-item span {
  max-width: 62px;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10px;
  font-weight: 700;
}

.nav-item.active,
.nav-item:hover {
  color: #fffaf1;
  background: rgba(255, 250, 241, 0.12);
}

.help-button,
.user-avatar {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  margin-top: auto;
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 50%;
  color: #fff;
  background: transparent;
  font-weight: 800;
}

.user-avatar {
  margin-top: 6px;
  border: 0;
  color: var(--navy);
  background: linear-gradient(135deg, #fffaf1, #d2ad71);
  font-size: 11px;
}

.people-panel,
.contact-stage,
.info-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--paper);
}

.people-panel {
  display: flex;
  flex-direction: column;
}

.panel-header,
.stage-toolbar,
.info-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 72px;
  padding: 17px 24px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  margin: 0 0 2px;
  color: var(--gold);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h1,
h2,
h3,
h4,
p {
  margin-top: 0;
}

h1,
h2,
h3,
h4,
.hero-contact h2 {
  color: var(--navy);
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.01em;
}

h1 {
  margin-bottom: 0;
  font-size: 22px;
  line-height: 1.1;
}

.header-actions {
  display: flex;
  gap: 9px;
}

.header-actions button,
.mini-button,
.close-button {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: 50%;
  color: #252a30;
  background: transparent;
}

.header-actions button:hover,
.mini-button.active,
.mini-button:hover {
  background: #f0e7d8;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 22px 8px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text-muted);
  background: var(--soft);
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  color: var(--navy);
  background: transparent;
}

.market-filter {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 3px 22px 10px;
}

.market-filter button {
  flex: 0 0 auto;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 11px;
  color: #675f54;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.market-filter button.active,
.market-filter button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.quick-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 22px 10px;
}

.metric-card {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 9px;
  background: var(--paper);
}

.metric-card span,
.metric-card strong {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.metric-card span {
  margin-bottom: 2px;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 800;
}

.metric-card strong {
  color: var(--navy);
  font-size: 14px;
}

.select-all {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 8px 18px 12px;
  border: 0;
  color: var(--navy);
  background: transparent;
  text-align: left;
}

.select-all span {
  width: 42px;
  height: 42px;
  border: 2px solid var(--line);
  border-radius: 50%;
}

.contact-list {
  overflow: auto;
  padding: 0 10px 18px;
}

.contact-row {
  display: grid;
  grid-template-columns: 46px minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  width: 100%;
  border: 0;
  border-radius: 8px;
  padding: 10px 10px;
  color: var(--navy);
  background: transparent;
  text-align: left;
}

.contact-row:hover,
.contact-row.selected {
  background: #f3ebdc;
}

.mini-avatar,
.profile-photo {
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: #fff;
  background:
    radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.78), transparent 20%),
    var(--avatar-color);
  font-weight: 800;
}

.mini-avatar {
  width: 42px;
  height: 42px;
  font-size: 13px;
}

.contact-copy {
  min-width: 0;
}

.contact-copy strong,
.contact-copy small {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.contact-copy strong {
  font-size: 14px;
}

.contact-copy small {
  color: var(--text-muted);
  font-size: 11px;
}

.row-meta {
  display: grid;
  justify-items: end;
  gap: 5px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #68727c;
  font-size: 11px;
  font-weight: 800;
}

.status-pill::after,
.segmented span {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  content: "";
}

.status-pill.lead::after,
.lead-dot {
  background: var(--orange);
}

.status-pill.client::after,
.client-dot {
  background: var(--blue);
}

.status-pill.all::after,
.all-dot {
  background: #111821;
}

.other-dot {
  background: #cdd4da;
}

.priority-pill {
  border-radius: 999px;
  padding: 3px 7px;
  color: #5b6570;
  background: #efe8db;
  font-size: 10px;
  font-weight: 900;
}

.priority-pill.high {
  color: #6f4214;
  background: #f7e4c8;
}

.priority-pill.medium {
  color: #304f37;
  background: #e7efe2;
}

.priority-pill.low {
  color: #59636d;
  background: #ece7df;
}

.high-dot {
  background: var(--gold);
}

.medium-dot {
  background: var(--green);
}

.low-dot {
  background: #9ba5ad;
}

.contact-stage {
  display: flex;
  flex-direction: column;
  background: var(--cream);
}

.contact-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  padding: 14px 18px 0;
}

.contact-tabs button {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 7px;
  color: #6b6258;
  background: #fffdf8;
  font-weight: 900;
}

.contact-tabs button.active,
.contact-tabs button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.stage-toolbar {
  justify-content: center;
  position: relative;
}

.segmented {
  display: flex;
  gap: 8px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #f6efe2;
}

.segmented button {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 82px;
  border: 0;
  border-radius: 999px;
  padding: 7px 13px;
  color: #8c8173;
  background: transparent;
  font-size: 12px;
  font-weight: 800;
}

.segmented button.active {
  color: var(--navy);
  background: #fffdf8;
  box-shadow: 0 3px 12px rgba(8, 38, 75, 0.08);
}

.close-button {
  position: absolute;
  right: 22px;
  font-size: 26px;
}

.hero-contact {
  display: grid;
  justify-items: center;
  padding: 42px 24px 34px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, #fffdf8 0%, #fbf5ea 100%);
}

.profile-photo {
  width: 124px;
  height: 124px;
  margin-bottom: 20px;
  border: 5px solid #fffdf8;
  box-shadow: 0 12px 30px rgba(8, 38, 75, 0.13);
  font-size: 31px;
}

.avatar-image {
  overflow: hidden;
  background: #efe8db;
}

.avatar-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.company-avatar,
.company-photo {
  background:
    radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.72), transparent 22%),
    linear-gradient(135deg, var(--navy), #174977 58%, var(--gold));
}

.company-image {
  border-color: rgba(255, 253, 248, 0.96);
  background: #efe8db;
}

.company-photo {
  color: #fffaf1;
  font-family: var(--font-display);
  font-size: 40px;
  box-shadow:
    0 16px 36px rgba(8, 38, 75, 0.16),
    0 0 0 1px rgba(185, 133, 58, 0.18);
}

.account-label {
  margin-bottom: 9px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
}

.hero-contact h2 {
  margin-bottom: 3px;
  font-size: clamp(27px, 3vw, 36px);
  line-height: 1.1;
}

.hero-contact p {
  margin-bottom: 24px;
  color: var(--text-muted);
}

.deal-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: -8px 0 22px;
}

.deal-strip span {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 10px;
  color: #3e4852;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
}

.more-wrap {
  position: relative;
}

.more-menu {
  position: absolute;
  right: 0;
  z-index: 10;
  display: grid;
  width: 168px;
  margin-top: 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffdf8;
  box-shadow: 0 18px 42px rgba(8, 38, 75, 0.14);
  overflow: hidden;
}

.more-menu button {
  border: 0;
  padding: 11px 13px;
  color: var(--navy);
  background: #fffdf8;
  text-align: left;
  font-size: 13px;
  font-weight: 800;
}

.more-menu button:hover {
  background: #f3ebdc;
}

.action-button {
  display: grid;
  justify-items: center;
  gap: 7px;
  min-width: 62px;
  border: 0;
  color: #4d463f;
  background: transparent;
  font-size: 12px;
  font-weight: 800;
}

.action-button span {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(226, 216, 201, 0.9);
  background: linear-gradient(180deg, #fffdf8, #efe7d8);
  color: var(--navy);
  font-size: 18px;
  box-shadow: 0 8px 18px rgba(8, 38, 75, 0.07);
}

.action-button:hover span {
  border-color: #ceb386;
  background: linear-gradient(180deg, #fffaf1, #e3d2b8);
  box-shadow: 0 10px 22px rgba(8, 38, 75, 0.11);
}

.activity {
  flex: 1;
  overflow: auto;
  padding: 26px clamp(22px, 5vw, 44px) 42px;
}

.activity-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.activity-header h3 {
  margin: 0;
  color: #59636d;
  font-size: 14px;
  font-weight: 600;
}

.activity-header div {
  display: flex;
  gap: 5px;
}

.activity-card {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
  padding: 21px 22px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(251, 246, 237, 0.94));
  box-shadow: 0 16px 40px rgba(8, 38, 75, 0.07);
}

.activity-card h4 {
  margin-bottom: 4px;
  font-size: 20px;
}

.activity-card p {
  margin-bottom: 5px;
  color: #4e5963;
  font-size: 14px;
}

.activity-card button {
  border: 0;
  padding: 0;
  color: #2484c6;
  background: transparent;
  font-size: 13px;
  font-weight: 800;
}

.company-linked-card {
  align-items: flex-start;
}

.company-linked-card > div {
  width: 100%;
}

.link-row {
  display: grid;
  width: 100%;
  margin-top: 8px;
  border: 1px solid var(--line) !important;
  border-radius: 7px;
  padding: 10px 12px !important;
  color: var(--navy) !important;
  background: #fbf6ed !important;
  text-align: left;
}

.link-row:hover {
  border-color: #ceb386 !important;
  background: #f4eadb !important;
}

.link-row small {
  color: var(--text-muted);
  font-size: 12px;
}

.next-step-card {
  border-color: #d6e8ce;
  background: linear-gradient(180deg, #fffdf8, #f7f0e4);
}

.workspace-shell {
  grid-template-columns: 72px minmax(0, 1fr);
}

.contacts-layout {
  display: grid;
  grid-template-columns: minmax(260px, 360px) minmax(380px, 1fr) minmax(270px, 330px);
  min-height: calc(100vh - 92px);
}

.crm-panel {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--paper);
}

.panel-header.compact {
  min-height: 72px;
}

.panel-header.compact button {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 50%;
  background: #f1e6d5;
}

.workspace-page {
  min-width: 0;
  min-height: 100vh;
  overflow: auto;
  background:
    radial-gradient(circle at 100% 0%, rgba(185, 133, 58, 0.1), transparent 24rem),
    var(--cream);
}

.workspace-header {
  position: relative;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 92px;
  padding: 24px 30px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(255, 253, 248, 0.9)),
    radial-gradient(circle at 18% 0%, rgba(185, 133, 58, 0.12), transparent 20rem);
  box-shadow: 0 14px 34px rgba(8, 38, 75, 0.06);
  backdrop-filter: blur(14px);
}

.workspace-header h1 {
  margin-bottom: 5px;
  font-size: 34px;
}

.workspace-header p {
  margin-bottom: 0;
  color: var(--text-muted);
}

.workspace-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 9px;
}

.workspace-actions button,
.workspace-card button,
.campaign-card button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 12px;
  color: var(--navy);
  background: linear-gradient(180deg, #fffdf8, #fbf6ed);
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 5px 14px rgba(8, 38, 75, 0.04);
}

.filter-row button {
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 12px;
  color: #6b6258;
  background: #fffdf8;
  font-size: 12px;
  font-weight: 800;
}

.filter-row button.active,
.filter-row button:hover {
  border-color: #ceb386;
  color: var(--navy);
  background: #f4eadb;
}

.workspace-actions button:hover,
.workspace-card button:hover,
.campaign-card button:hover {
  border-color: #ceb386;
  background: #f4eadb;
  box-shadow: 0 8px 20px rgba(8, 38, 75, 0.08);
}

.workspace-grid {
  display: grid;
  gap: 18px;
  padding: 22px 30px 0;
}

.home-system-layout {
  display: grid;
  grid-template-columns: minmax(520px, 1fr) minmax(260px, 360px);
  gap: 22px;
  padding: 28px 30px;
}

.relationship-system {
  position: relative;
  min-height: 660px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    radial-gradient(circle at 50% 48%, rgba(185, 133, 58, 0.16), transparent 10rem),
    radial-gradient(circle at center, rgba(255, 253, 248, 0.96) 0 16%, rgba(244, 239, 229, 0.7) 40%, rgba(255, 253, 248, 0.92) 100%),
    linear-gradient(135deg, #fffdf8, #f4efe5);
  box-shadow: 0 24px 70px rgba(8, 38, 75, 0.1);
}

.orbit-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px solid rgba(185, 133, 58, 0.24);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.orbit-high {
  width: 320px;
  height: 320px;
}

.orbit-medium {
  width: 460px;
  height: 460px;
}

.orbit-low {
  width: 590px;
  height: 590px;
}

.system-core {
  position: absolute;
  top: 50%;
  left: 50%;
  z-index: 3;
  display: grid;
  justify-items: center;
  width: 170px;
  min-height: 170px;
  padding: 18px;
  border: 1px solid rgba(185, 133, 58, 0.36);
  border-radius: 50%;
  background:
    linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(251, 246, 237, 0.96));
  box-shadow:
    0 24px 60px rgba(8, 38, 75, 0.14),
    inset 0 0 0 8px rgba(185, 133, 58, 0.06);
  transform: translate(-50%, -50%);
}

.system-core img {
  width: 82px;
  height: 82px;
  object-fit: contain;
}

.system-core span {
  color: var(--gold);
  font-size: 11px;

  <body>
    <div id="app"></div>
    <script>
const storageKey = "balai-crm-store-v4";
const app = document.querySelector("#app");

const countries = ["Finland", "Sweden", "Norway", "Indonesia", "Malaysia", "Philippines", "Singapore", "Others"];
const services = [
  "Market Opportunity Assessment",
  "Market Entry & Partner Development",
  "SEA Market Representation",
  "Trade Fair & Event Representation",
  "Cultural & Market Localization",
  "Internationalization Consulting"
];
const dealStages = ["New lead", "Qualified", "Proposal sent", "Follow-up", "Client", "Lost"];
const priorities = ["High", "Medium", "Low"];

const navItems = [
  ["Search", "search"],
  ["Home", "home"],
  ["Contacts", "contacts"],
  ["My day", "day"],
  ["Comms", "comms"],
  ["Sales", "sales"],
  ["Marketing", "marketing"],
  ["Automation", "automation"],
  ["Reports", "reports"]
];

let store = loadStore();
const state = {
  view: "home",
  query: "",
  country: "All",
  stage: "All",
  selectedContactId: "",
  selectedCompanyId: "",
  selectedDealId: "",
  contactMode: "people",
  modal: null,
  editId: null,
  prefillService: "",
  prefillCompanyId: "",
  pictureTarget: "",
  moreOpen: false,
  notice: ""
};

function emptyStore() {
  return {
    contacts: [],
    companies: [],
    deals: [],
    tasks: [],
    automations: [
      { id: makeId(), title: "Create reminder after new lead", active: true },
      { id: makeId(), title: "Flag high-value deals over EUR 15,000", active: true },
      { id: makeId(), title: "Warn when follow-up date is missed", active: true }
    ],
    settings: { createdAt: new Date().toISOString() }
  };
}

function loadStore() {
  try {
    const parsed = JSON.parse(localStorage.getItem(storageKey));
    if (parsed && Array.isArray(parsed.contacts) && Array.isArray(parsed.companies)) {
      return normalizeStore(parsed);
    }
  } catch {
    return emptyStore();
  }
  return emptyStore();
}

function normalizeStore(next) {
  return {
    contacts: (next.contacts || []).map((contact) => ({
      ...contact,
      country: contact.country || "Finland",
      status: contact.status || "Lead",
      priority: contact.priority || "Medium"
    })),
    companies: (next.companies || []).map((company) => ({
      ...company,
      country: company.country || "Finland",
      priority: company.priority || "Medium",
      image: company.image || ""
    })),
    deals: next.deals || [],
    tasks: next.tasks || [],
    automations: next.automations || emptyStore().automations,
    settings: next.settings || {}
  };
}

function persist(message = "Saved") {
  try {
    localStorage.setItem(storageKey, JSON.stringify(store));
    flash(message);
  } catch {
    flash("Storage full. Export your data now.");
  }
}

function flash(message) {
  state.notice = message;
  render();
  setTimeout(() => {
    if (state.notice === message) {
      state.notice = "";
      render();
    }
  }, 1800);
}

function totals() {
  const pipeline = store.deals.reduce((sum, deal) => sum + Number(deal.value || 0), 0);
  const openDeals = store.deals.filter((deal) => !["Client", "Lost"].includes(deal.stage)).length;
  const overdueTasks = store.tasks.filter((task) => task.dueDate && task.dueDate < today() && !task.done).length;
  return {
    pipeline,
    openDeals,
    overdueTasks,
    contacts: store.contacts.length,
    companies: store.companies.length
  };
}

function selectedContact() {
  return store.contacts.find((contact) => contact.id === state.selectedContactId) || store.contacts[0] || null;
}

function selectedCompany() {
  return store.companies.find((company) => company.id === state.selectedCompanyId) || store.companies[0] || null;
}

function selectedDeal() {
  return store.deals.find((deal) => deal.id === state.selectedDealId) || null;
}

function filteredContacts() {
  const query = state.query.trim().toLowerCase();
  return store.contacts.filter((contact) => {
    const company = companyName(contact.companyId);
    const haystack = [
      contact.firstName,
      contact.lastName,
      contact.email,
      contact.phone,
      contact.country,
      contact.role,
      contact.priority,
      company,
      contact.notes
    ]
      .join(" ")
      .toLowerCase();
    const countryMatch = state.country === "All" || contact.country === state.country;
    return countryMatch && haystack.includes(query);
  });
}

function filteredCompanies() {
  const query = state.query.trim().toLowerCase();
  return store.companies.filter((company) => {
    const haystack = [company.name, company.country, company.segment, company.priority, company.website, company.notes]
      .join(" ")
      .toLowerCase();
    const countryMatch = state.country === "All" || company.country === state.country;
    return countryMatch && haystack.includes(query);
  });
}

function filteredDeals() {
  const query = state.query.trim().toLowerCase();
  return store.deals.filter((deal) => {
    const haystack = [
      deal.title,
      deal.country,
      deal.service,
      deal.stage,
      companyName(deal.companyId),
      contactName(deal.contactId),
      deal.notes
    ]
      .join(" ")
      .toLowerCase();
    const countryMatch = state.country === "All" || deal.country === state.country;
    const stageMatch = state.stage === "All" || deal.stage === state.stage;
    return countryMatch && stageMatch && haystack.includes(query);
  });
}

function render() {
  app.innerHTML = `
    <main class="crm-shell workspace-shell" aria-label="BALAI Customer Relationship Management">
      ${renderSidebar()}
      <section class="workspace-page">${renderView()}</section>
      ${renderModal()}

function companyPlanets() {
  const companies = [...store.companies]
    .sort((a, b) => priorityRank(a.priority) - priorityRank(b.priority) || a.name.localeCompare(b.name))
    .slice(0, 14);
  return companies.map((company, index) => companyPlanet(company, index, companies.length)).join("");
}

function companyPlanet(company, index, total) {
  const radius = companyOrbitRadius(company.priority);
  const angle = total === 1 ? -90 : -90 + (index * 360) / total;
  const size = companyPlanetSize(company.priority);
  const x = Math.cos((angle * Math.PI) / 180) * radius;
  const y = Math.sin((angle * Math.PI) / 180) * radius;
  const contacts = store.contacts.filter((contact) => contact.companyId === company.id).length;
  return `
    <button
      class="company-planet ${priorityClass(company.priority)}"
      type="button"
      data-action="open-company"
      data-id="${company.id}"
      style="--planet-x:${x}px; --planet-y:${y}px; --planet-size:${size}px;"
      title="${escapeHtml(company.name)}"
    >
      ${companyPlanetVisual(company)}
      <strong>${escapeHtml(company.name || "Unnamed company")}</strong>
      <small>${company.priority || "Medium"} / ${contacts} people</small>
    </button>
  `;
}

function countryBar(country) {
  const value = store.deals.filter((deal) => deal.country === country).reduce((sum, deal) => sum + Number(deal.value || 0), 0);
  const width = totals().pipeline ? Math.max(5, Math.round((value / totals().pipeline) * 100)) : 5;
  return `<div class="report-bar"><span>${country}</span><div><i style="width:${width}%"></i></div><strong>${formatMoney(value)}</strong></div>`;
}

function renderModal() {
  if (!state.modal) return "";
  const modalMap = { contact: contactForm, company: companyForm, deal: dealForm, task: taskForm };
  return `<div class="modal-backdrop" role="dialog" aria-modal="true">${(modalMap[state.modal] || contactForm)()}</div>`;
}

function contactForm() {
  const contact = state.editId ? store.contacts.find((item) => item.id === state.editId) : {};
  return formShell(state.editId ? "Edit contact" : "Add contact", "contactForm", `
    ${input("firstName", "First name", contact.firstName)}
    ${input("lastName", "Last name", contact.lastName)}
    ${select("companyId", "Company", contact.companyId || state.prefillCompanyId, [["", "No company"], ...store.companies.map((company) => [company.id, company.name])])}
    ${input("role", "Role", contact.role)}
    ${input("email", "Email", contact.email)}
    ${input("phone", "Phone", contact.phone)}
    ${select("country", "Country", contact.country, countries)}
    ${select("status", "Status", contact.status, ["Lead", "Client"])}
    ${select("priority", "Priority", contact.priority, priorities)}
    ${input("followUpDate", "Follow-up date", contact.followUpDate, "date")}
    ${textarea("notes", "Notes", contact.notes)}
  `);
}

function companyForm() {
  const company = state.editId ? store.companies.find((item) => item.id === state.editId) : {};
  return formShell(state.editId ? "Edit company" : "Add company", "companyForm", `
    ${input("name", "Company name", company.name)}
    ${select("country", "Country", company.country, countries)}
    ${input("segment", "Company type", company.segment)}
    ${select("priority", "Priority", company.priority, priorities)}
    ${input("website", "Website", company.website)}
    ${textarea("notes", "Notes", company.notes)}
  `);
}

function dealForm() {
  const deal = state.editId ? store.deals.find((item) => item.id === state.editId) : {};
  return formShell(state.editId ? "Edit deal" : "Add deal", "dealForm", `
    ${input("title", "Deal title", deal.title)}
    ${select("companyId", "Company", deal.companyId || state.prefillCompanyId, [["", "No company"], ...store.companies.map((company) => [company.id, company.name])])}
    ${select("contactId", "Contact", deal.contactId, [["", "No contact"], ...store.contacts.map((contact) => [contact.id, contactName(contact.id)])])}
    ${select("country", "Country", deal.country, countries)}
    ${select("service", "Service", deal.service || state.prefillService, services)}
    ${select("stage", "Stage", deal.stage, dealStages)}
    ${input("value", "Value EUR", deal.value, "number")}
    ${input("followUpDate", "Follow-up date", deal.followUpDate, "date")}
    ${textarea("notes", "Notes", deal.notes)}
  `);
}

function taskForm() {
  const task = state.editId ? store.tasks.find((item) => item.id === state.editId) : {};
  return formShell(state.editId ? "Edit task" : "Add task", "taskForm", `
    ${input("title", "Task", task.title)}
    ${select("contactId", "Contact", task.contactId, [["", "No contact"], ...store.contacts.map((contact) => [contact.id, contactName(contact.id)])])}
    ${select("companyId", "Company", task.companyId, [["", "No company"], ...store.companies.map((company) => [company.id, company.name])])}
    ${input("dueDate", "Due date", task.dueDate, "date")}
  `);
}

function formShell(title, id, fields) {
  return `<form class="edit-modal" id="${id}"><header><div><p class="eyebrow">BALAI CRM</p><h2>${title}</h2></div><button type="button" data-action="close-modal">x</button></header><div class="form-grid">${fields}</div><footer><button type="button" data-action="close-modal">Cancel</button><button type="submit">Save</button></footer></form>`;
}

function input(name, label, value = "", type = "text") {
  return `<label><span>${label}</span><input name="${name}" type="${type}" value="${escapeHtml(value || "")}" /></label>`;
}

function textarea(name, label, value = "") {
  return `<label class="wide"><span>${label}</span><textarea name="${name}">${escapeHtml(value || "")}</textarea></label>`;
}

function select(name, label, value = "", options = []) {
  return `<label><span>${label}</span><select name="${name}">${options.map((option) => {
    const pair = Array.isArray(option) ? option : [option, option];
    return `<option value="${escapeHtml(pair[0])}" ${pair[0] === value ? "selected" : ""}>${pair[1]}</option>`;
  }).join("")}</select></label>`;
}

function bindEvents() {
  document.querySelectorAll("[data-action]").forEach((element) => element.addEventListener("click", handleAction));
  document.querySelectorAll("#searchInput,#pageSearchInput").forEach((inputEl) => {
    inputEl.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });
  });
  document.querySelector("#contactForm")?.addEventListener("submit", saveContact);
  document.querySelector("#companyForm")?.addEventListener("submit", saveCompany);
  document.querySelector("#dealForm")?.addEventListener("submit", saveDeal);
  document.querySelector("#taskForm")?.addEventListener("submit", saveTask);
  document.querySelector("#pictureInput")?.addEventListener("change", savePicture);
  document.querySelector("#importInput")?.addEventListener("change", importData);
}

function handleAction(event) {
  const el = event.currentTarget;
  const action = el.dataset.action;
  if (action === "nav") {
    state.view = el.dataset.view;
    state.moreOpen = false;
    render();
  } else if (action === "open-modal") {
    state.modal = el.dataset.modal;
    state.editId = null;
    state.prefillService = el.dataset.service || "";
    state.prefillCompanyId = el.dataset.companyId || "";
    render();
  } else if (action === "close-modal") {
    state.modal = null;
    state.editId = null;
    state.prefillService = "";
    state.prefillCompanyId = "";
    state.pictureTarget = "";
    render();
  } else if (action === "set-country") {
    state.country = el.dataset.country;
    render();
  } else if (action === "set-stage-filter") {
    state.stage = el.dataset.stage;
    render();
  } else if (action === "set-contact-mode") {
    state.contactMode = el.dataset.mode;
    state.moreOpen = false;
    render();
  } else if (action === "open-contact") {
    state.selectedContactId = el.dataset.id;
    state.contactMode = "people";
    state.view = "contacts";
    render();
  } else if (action === "open-company") {
    state.selectedCompanyId = el.dataset.id;
    state.contactMode = "companies";
    state.view = "contacts";
    state.moreOpen = false;
    render();
  } else if (action === "toggle-more") {
    state.moreOpen = !state.moreOpen;
    render();
  } else if (action === "edit-contact") {
    state.modal = "contact";
    state.editId = state.selectedContactId;
    state.moreOpen = false;
    render();
  } else if (action === "delete-contact") {
    deleteContact();
  } else if (action === "add-picture") {
    state.pictureTarget = "contact";
    state.moreOpen = false;
    render();
    setTimeout(() => document.querySelector("#pictureInput")?.click(), 0);
  } else if (action === "set-contact-status") {
    updateContact(state.selectedContactId, { status: el.dataset.status });
  } else if (action === "set-company-priority") {
    updateCompany(state.selectedCompanyId || selectedCompany()?.id, { priority: el.dataset.priority });
  } else if (action === "edit-company") {
    state.modal = "company";
    state.editId = el.dataset.id;
    render();
  } else if (action === "edit-selected-company") {
    state.modal = "company";
    state.editId = state.selectedCompanyId || selectedCompany()?.id || "";
    state.moreOpen = false;
    render();
  } else if (action === "add-company-picture") {
    state.pictureTarget = "company";
    state.moreOpen = false;
    render();
    setTimeout(() => document.querySelector("#pictureInput")?.click(), 0);
  } else if (action === "open-company-website") {
    openCompanyWebsite();
  } else if (action === "delete-company") {
    deleteCompany();
  } else if (action === "edit-deal") {
    state.modal = "deal";
    state.editId = el.dataset.id;
    render();
  } else if (action === "toggle-task") {
    store.tasks = store.tasks.map((task) => task.id === el.dataset.id ? { ...task, done: !task.done } : task);
    persist("Task updated");
  } else if (action === "toggle-automation") {
    store.automations = store.automations.map((rule) => rule.id === el.dataset.id ? { ...rule, active: !rule.active } : rule);
    persist("Automation updated");
  } else if (action === "export") {
    exportData();
  } else if (action === "import") {
    document.querySelector("#importInput")?.click();
  } else if (action === "contact-action") {
    flash(`${el.dataset.label} action ready`);
  } else if (action === "help") {
    flash("Start with Companies, then Contacts, then Deals.");
  }
}

function saveContact(event) {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(event.currentTarget));
  const existing = store.contacts.find((item) => item.id === state.editId);
  const next = {
    ...(existing || {}),
    id: existing?.id || makeId(),
    firstName: data.firstName.trim(),
    lastName: data.lastName.trim(),
    companyId: data.companyId,
    role: data.role.trim(),
    email: data.email.trim(),
    phone: data.phone.trim(),
    country: data.country,
    status: data.status || "Lead",
    priority: data.priority || "Medium",
    followUpDate: data.followUpDate,
    notes: data.notes.trim(),
    image: existing?.image || "",
    color: existing?.color || randomColor()
  };
  store.contacts = existing ? store.contacts.map((item) => item.id === existing.id ? next : item) : [next, ...store.contacts];
  state.selectedContactId = next.id;
  state.contactMode = "people";
  state.view = "contacts";
  closeAndPersist("Contact saved");
}

function saveCompany(event) {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(event.currentTarget));
  const existing = store.companies.find((item) => item.id === state.editId);
  const next = {
    ...(existing || {}),
    id: existing?.id || makeId(),
    name: data.name.trim(),
    country: data.country,
    segment: data.segment.trim(),
    priority: data.priority || "Medium",
    website: data.website.trim(),
    notes: data.notes.trim(),
    image: existing?.image || ""
  };
  store.companies = existing ? store.companies.map((item) => item.id === existing.id ? next : item) : [next, ...store.companies];
  state.selectedCompanyId = next.id;
  state.contactMode = "companies";
  state.view = "contacts";
  closeAndPersist("Company saved");
}

function saveDeal(event) {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(event.currentTarget));
  const existing = store.deals.find((item) => item.id === state.editId);
  const next = {
    ...(existing || {}),
    id: existing?.id || makeId(),
    title: data.title.trim(),
    companyId: data.companyId,
    contactId: data.contactId,
    country: data.country,
    service: data.service,
    stage: data.stage || "New lead",
    value: Number(data.value || 0),
    followUpDate: data.followUpDate,
    notes: data.notes.trim()
  };
  store.deals = existing ? store.deals.map((item) => item.id === existing.id ? next : item) : [next, ...store.deals];
  state.view = "sales";
  closeAndPersist("Deal saved");
}

function saveTask(event) {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(event.currentTarget));
  const existing = store.tasks.find((item) => item.id === state.editId);
  const next = {
    ...(existing || {}),
    id: existing?.id || makeId(),
    title: data.title.trim(),
    contactId: data.contactId,
    companyId: data.companyId,
    dueDate: data.dueDate,
    done: existing?.done || false
  };
  store.tasks = existing ? store.tasks.map((item) => item.id === existing.id ? next : item) : [next, ...store.tasks];
  state.view = "day";
  closeAndPersist("Task saved");
}

function closeAndPersist(message) {
  state.modal = null;
  state.editId = null;
  state.prefillService = "";
  state.prefillCompanyId = "";
  state.pictureTarget = "";
  persist(message);
}

function savePicture(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const image = String(reader.result);
    if (state.pictureTarget === "company") {
      updateCompany(state.selectedCompanyId || selectedCompany()?.id, { image }, "Company picture saved");
    } else if (state.selectedContactId) {
      updateContact(state.selectedContactId, { image }, "Picture saved");
    } else {
      flash("No contact selected");
    }
    event.target.value = "";
    state.pictureTarget = "";
  };
  reader.readAsDataURL(file);
}

function updateContact(id, patch, message = "Contact updated") {
  store.contacts = store.contacts.map((contact) => contact.id === id ? { ...contact, ...patch } : contact);
  persist(message);
}

function updateCompany(id, patch, message = "Company updated") {
  if (!id) return;
  store.companies = store.companies.map((company) => company.id === id ? { ...company, ...patch } : company);
  state.selectedCompanyId = id;
  persist(message);
}

function openCompanyWebsite() {
  const company = selectedCompany();
  if (!company?.website) {
    flash("No website saved yet");
    return;
  }
  window.open(normalizeUrl(company.website), "_blank", "noopener,noreferrer");
}

function normalizeUrl(url) {
  const clean = String(url || "").trim();
  return /^https?:\/\//i.test(clean) ? clean : `https://${clean}`;
}

function deleteContact() {
  const contact = store.contacts.find((item) => item.id === state.selectedContactId);
  if (!contact || !confirm(`Delete ${contactName(contact.id)}?`)) return;
  store.contacts = store.contacts.filter((item) => item.id !== contact.id);
  store.deals = store.deals.map((deal) => deal.contactId === contact.id ? { ...deal, contactId: "" } : deal);
  store.tasks = store.tasks.map((task) => task.contactId === contact.id ? { ...task, contactId: "" } : task);
  state.selectedContactId = store.contacts[0]?.id || "";
  state.moreOpen = false;
  persist("Contact deleted");
}

function deleteCompany() {
  const company = selectedCompany();
  if (!company || !confirm(`Delete ${company.name || "this company"}? Linked people and deals will stay, but the company link will be cleared.`)) return;
  store.companies = store.companies.filter((item) => item.id !== company.id);
  store.contacts = store.contacts.map((contact) => contact.companyId === company.id ? { ...contact, companyId: "" } : contact);
  store.deals = store.deals.map((deal) => deal.companyId === company.id ? { ...deal, companyId: "" } : deal);
  state.selectedCompanyId = store.companies[0]?.id || "";
  persist("Company deleted");
}

function exportData() {
  const blob = new Blob([JSON.stringify(store, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `balai-crm-backup-${today()}.json`;
  link.click();
  URL.revokeObjectURL(url);
  flash("Backup exported");
}

function importData(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      store = normalizeStore(JSON.parse(String(reader.result)));
      persist("Backup imported");
    } catch {
      flash("Import failed");
    }
  };
  reader.readAsText(file);
}

function infoSection(title, rows) {
  return `<section class="info-section"><h3>${title}</h3>${rows.map(([label, value]) => `<dl><dt>${label}</dt><dd>${escapeHtml(value || "-")}</dd></dl>`).join("")}</section>`;
}

function avatar(contact, className) {
  if (contact.image) return `<span class="${className} avatar-image"><img src="${contact.image}" alt="${escapeHtml(contactName(contact.id))}" /></span>`;
  return `<span class="${className}" style="--avatar-color:${contact.color || "#afd0f1"}">${initials(contact)}</span>`;
}

function companyPhoto(company, className) {
  if (company.image) return `<span class="${className} avatar-image company-image"><img src="${company.image}" alt="${escapeHtml(company.name || "Company")}" /></span>`;
  return `<span class="${className}">${companyInitials(company)}</span>`;
}

function companyPlanetVisual(company) {
  if (company.image) return `<span class="planet-image"><img src="${company.image}" alt="${escapeHtml(company.name || "Company")}" /></span>`;
  return `<span>${companyInitials(company)}</span>`;
}

function companyName(id) {
  return store.companies.find((company) => company.id === id)?.name || "";
}

function companyInitials(company) {
  return String(company?.name || "BA")
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map((part) => part[0])
    .join("")
    .toUpperCase() || "BA";
}

function contactName(id) {
  const contact = store.contacts.find((item) => item.id === id);
  if (!contact) return "";
  return `${contact.firstName || ""} ${contact.lastName || ""}`.trim() || "Unnamed contact";
}

function priorityRank(priority = "Medium") {
  return { High: 0, Medium: 1, Low: 2 }[priority] ?? 1;
}

function priorityClass(priority = "Medium") {
  return String(priority || "Medium").toLowerCase();
}

function companyOrbitRadius(priority = "Medium") {
  return { High: 145, Medium: 215, Low: 285 }[priority] || 215;
}

function companyPlanetSize(priority = "Medium") {
  return { High: 92, Medium: 78, Low: 66 }[priority] || 78;
}

function sumDeals(stage) {
  return filteredDeals().filter((deal) => deal.stage === stage).reduce((sum, deal) => sum + Number(deal.value || 0), 0);
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function initials(contact) {
  return `${contact.firstName?.[0] || ""}${contact.lastName?.[0] || ""}`.toUpperCase() || "BA";
}

function makeId() {
  return typeof crypto !== "undefined" && crypto.randomUUID ? crypto.randomUUID() : `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function randomColor() {
  const colors = ["#f1a7b8", "#b5d7a8", "#afd0f1", "#ccbdf0", "#f1c9a7", "#d9e8b8"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function formatMoney(value) {
  return `EUR ${Number(value || 0).toLocaleString("en-US")}`;
}

function escapeHtml(value) {
  return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
}

function navIcon(key) {
  const icons = {
    search: `<svg viewBox="0 0 24 24"><path d="m21 21-4.2-4.2m2-5.3a7.3 7.3 0 1 1-14.6 0 7.3 7.3 0 0 1 14.6 0Z"/></svg>`,
    home: `<svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>`,
    contacts: `<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="4"/></svg>`,
    day: `<svg viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18"/><rect x="3" y="5" width="18" height="16" rx="2"/></svg>`,

    sales: `<svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7H15a3.5 3.5 0 0 1 0 7H6"/></svg>`,
    marketing: `<svg viewBox="0 0 24 24"><path d="M3 11v3a2 2 0 0 0 2 2h3l8 4V5L8 9H5a2 2 0 0 0-2 2Z"/></svg>`,
    automation: `<svg viewBox="0 0 24 24"><path d="m13 2-8 12h7l-1 8 8-12h-7Z"/></svg>`,
    reports: `<svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>`,
    plus: `<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`,
    download: `<svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>`,
    upload: `<svg viewBox="0 0 24 24"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>`,

    message: `<svg viewBox="0 0 24 24"><path d="M21 14a4 4 0 0 1-4 4H9l-6 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"/></svg>`,
    info: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>`,
    website: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>`
  };
  return icons[key] || icons.plus;
}

function actionIcon(action) {
  const icons = {
    Call: `<svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.4 19.4 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.8a2 2 0 0 1-.4 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>`,
    Text: navIcon("comms"),
    Email: `<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>`,
    Tag: `<svg viewBox="0 0 24 24"><path d="M20 13 11 22 2 13V4h9l9 9Z"/><path d="M7.5 8.5h.01"/></svg>`,
    Note: navIcon("task"),
    More: `<svg viewBox="0 0 24 24"><path d="M5 12h.01M12 12h.01M19 12h.01"/></svg>`
  };
  return icons[action] || navIcon("plus");
}

render();

    </script>
  </body>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open BALAI CRM</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #182028;
        background: #f3f5f7;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 34px;
        border: 1px solid #dde3e8;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 20px 45px rgba(20, 30, 40, 0.1);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 22px;
        color: #64717d;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 7px;
        padding: 0 18px;
        color: #fff;
        background: #111821;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BALAI Customer Relationship Management</h1>
      <p>Open the CRM prototype in a separate browser tab.</p>
      <a href="./index.html" target="_blank" rel="noopener">Open CRM in new tab</a>
    </main>
  </body>
</html>
